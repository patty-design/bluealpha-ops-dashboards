<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Needs — Blue Alpha Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B2438;
      --navy-light: #233050;
      --red: #BD3333;
      --cream: #DDD8C4;
      --steel: #5B7FA0;
      --orange: #D97706;
      --yellow: #CA8A04;
      --amber: #B45309;
      --green: #16A34A;
      --gray: #6B7280;
      --card-bg: #2e4068;
      --border: rgba(255,255,255,0.08);
    }

    body {
      background: var(--navy);
      color: var(--cream);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--navy-light);
      border-bottom: 2px solid var(--red);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header .logo-bar {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.5rem;
      color: #fff;
    }

    header .subtitle {
      font-size: 0.8rem;
      color: var(--steel);
      margin-top: 0.15rem;
    }

    .header-right {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--steel);
      text-align: right;
    }

    #alert-bar {
      display: none;
    }

    .red-divider {
      height: 4px;
      background: var(--red);
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .two-col {
      display: grid;
      grid-template-columns: 60% 40%;
      gap: 1.25rem;
      align-items: start;
    }

    @media (max-width: 768px) {
      .two-col { grid-template-columns: 1fr; }
    }

    .section-card {
      background: var(--card-bg);
      border-radius: 0.75rem;
      overflow: hidden;
    }

    .section-header {
      padding: 0.85rem 1.1rem;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid var(--border);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--steel);
    }

    /* ── Process Queue ── */
    .process-list { list-style: none; }

    .process-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      border-left: 4px solid transparent;
      transition: background 0.15s;
    }
    .process-row:last-child { border-bottom: none; }
    .process-row.gap-alert { border-left-color: var(--red); }
    .process-row:hover { background: rgba(255,255,255,0.03); }

    .process-name {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 700;
      color: #fff;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* shared grid column template: name | P1 | P2 | P3 | P4 | P5 | pri-total | all-total | floor */
    .process-cell-grid {
      display: grid;
      grid-template-columns: 1fr 2.6rem 2.6rem 2.6rem 2.6rem 2.6rem 3.2rem 3.2rem 6rem;
      align-items: center;
      gap: 0;
    }

    .pcol {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .pcol-hdr {
      display: flex;
      justify-content: center;
      align-items: center;
      justify-self: stretch;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.02em;
    }

    .pill {
      width: 1.6rem;
      height: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      border-radius: 9999px;
      white-space: nowrap;
      padding: 0;
      flex-shrink: 0;
    }
    .pill-empty {
      width: 1.6rem;
      height: 1.6rem;
      flex-shrink: 0;
      border-radius: 9999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .pill-total { font-size: 0.85rem; font-weight: 600; color: var(--steel); text-align: center; }
    .pill-1 { background: #DC2626; color: #fff; }
    .pill-2 { background: #EA580C; color: #fff; }
    .pill-3 { background: #F59E0B; color: #fff; }
    .pill-4 { background: #EAB308; color: #1B2438; }
    .pill-5 { background: #FCD34D; color: #1B2438; }

    .process-col-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.3rem 1rem 0.3rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }
    .pch-name { flex: 1; }

    .on-floor-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-align: right;
      padding-right: 0.25rem;
    }
    .on-floor-label.zero  { color: var(--red); }
    .on-floor-label.some  { color: var(--green); }

    /* ── Unified Grid ── */
    .unified-header {
      display: grid;
      grid-template-columns: 60% 40%;
      border-bottom: 1px solid var(--border);
    }
    .uh-left, .uh-right {
      padding: 0.85rem 1.1rem;
      background: rgba(0,0,0,0.25);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--steel);
    }
    .uh-right { border-left: 1px solid var(--border); }

    .col-header-row {
      display: grid;
      grid-template-columns: 60% 40%;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }
    .ch-left {
      padding: 0.3rem 1rem;
    }
    .ch-right { border-left: 1px solid var(--border); }

    .unified-row {
      display: grid;
      grid-template-columns: 60% 40%;
      border-bottom: 1px solid var(--border);
    }
    .unified-row:last-child { border-bottom: none; }
    .unified-row:hover { background: rgba(255,255,255,0.02); }
    .unified-row.gap-alert .process-cell { border-left: 4px solid var(--red); }

    .process-cell {
      display: flex;
      align-items: center;
      padding: 0.6rem 1rem;
      border-right: 1px solid var(--border);
      min-height: 2.75rem;
    }

    .process-cell-grid {
      width: 100%;
    }

    .employee-cell {
      display: flex;
      flex-direction: column;
    }
    .employee-cell .employee-card {
      border-bottom: 1px solid var(--border);
    }
    .employee-cell .employee-card:last-child {
      border-bottom: none;
    }

    .unmatched-divider {
      padding: 0.35rem 1rem;
      background: rgba(0,0,0,0.2);
      font-size: 0.68rem;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #4B5563;
      border-bottom: 1px solid var(--border);
      border-top: 2px solid var(--border);
    }

    @media (max-width: 768px) {
      .unified-header, .col-header-row, .unified-row { grid-template-columns: 1fr; }
      .uh-right, .ch-right { border-left: none; border-top: 1px solid var(--border); }
      .process-cell { border-right: none; }
    }

    /* ── On Floor ── */
    .employee-card {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .employee-card:last-child { border-bottom: none; }
    .employee-card.amber-highlight { background: rgba(180,83,9,0.12); }

    .emp-top {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .emp-name {
      font-weight: 700;
      font-size: 0.88rem;
      color: #fff;
      flex: 1;
    }

    .priority-badge {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.2rem 0.55rem;
      border-radius: 0.35rem;
    }
    .priority-badge.p1 { background: #DC2626; color: #fff; }
    .priority-badge.p2 { background: #EA580C; color: #fff; }
    .priority-badge.p3 { background: #F59E0B; color: #fff; }
    .priority-badge.p4 { background: #EAB308; color: #1B2438; }
    .priority-badge.p5 { background: #FCD34D; color: #1B2438; }
    .priority-badge.p-unknown { background: #4B5563; color: #D1D5DB; }

    .amber-tag {
      font-size: 0.7rem;
      color: #fbbf24;
      font-style: italic;
    }

    .qual-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
    }

    .qual-tag {
      font-size: 0.65rem;
      background: rgba(91,127,160,0.2);
      color: var(--steel);
      border: 1px solid rgba(91,127,160,0.3);
      border-radius: 0.3rem;
      padding: 0.1rem 0.4rem;
    }

    .current-process {
      font-size: 0.78rem;
      color: var(--cream);
      opacity: 0.75;
      padding-left: 0.1rem;
    }

    /* ── Training Opportunities ── */
    #training-section {
      margin-top: 1.25rem;
    }

    .opportunity-list { list-style: none; }

    .opportunity-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .opportunity-card:last-child { border-bottom: none; }

    .opportunity-text {
      flex: 1;
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .btn-glide {
      flex-shrink: 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.35rem 0.75rem;
      border-radius: 0.4rem;
      border: 1px solid #374151;
      background: #1f2937;
      color: #6b7280;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .empty-state {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--steel);
      font-size: 0.88rem;
      font-style: italic;
    }

    /* Loading & error */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(27,36,56,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      color: var(--steel);
      gap: 0.75rem;
    }

    .spinner {
      width: 1.4rem;
      height: 1.4rem;
      border: 3px solid rgba(91,127,160,0.25);
      border-top-color: var(--steel);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-banner {
      background: #7f1d1d;
      color: #fca5a5;
      padding: 0.75rem 1.5rem;
      font-size: 0.85rem;
      display: none;
    }

    .refresh-btn {
      float: right;
      font-size: 0.7rem;
      background: none;
      border: 1px solid var(--steel);
      color: var(--steel);
      border-radius: 0.3rem;
      padding: 0.1rem 0.5rem;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
    }
    .refresh-btn:hover { background: rgba(91,127,160,0.15); }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  Loading data…
</div>

<header>
  <div>
    <div class="logo-bar">
      <h1>Training Needs</h1>
    </div>

  </div>
  <div class="header-right">
    <div style="display:flex; align-items:center; gap:0.5rem; justify-content:flex-end;">
      <div id="last-refresh">—</div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div id="refresh-countdown" style="margin-top:0.2rem; color:#9CA3AF; font-size:0.65rem; font-family:'Montserrat',sans-serif; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; text-align:right;">auto-refresh 60s</div>
  </div>
</header>

<div id="error-banner"></div>
<div id="alert-bar"></div>
<div class="red-divider"></div>

<main>
  <!-- Unified Process + On Floor Grid -->
  <div class="section-card">
    <div class="unified-header">
      <div class="uh-left">
        Priority Task Queue
      </div>
      <div class="uh-right">On Floor Now</div>
    </div>
    <div class="col-header-row">
      <div class="ch-left">
        <div class="process-cell-grid">
          <span></span>
          <span class="pcol-hdr" style="color:#DC2626;">1</span>
          <span class="pcol-hdr" style="color:#EA580C;">2</span>
          <span class="pcol-hdr" style="color:#F59E0B;">3</span>
          <span class="pcol-hdr" style="color:#EAB308;">4</span>
          <span class="pcol-hdr" style="color:#FCD34D;">5</span>
          <span class="pcol-hdr" style="color:#9CA3AF;">Pri</span>
          <span class="pcol-hdr" style="color:#5B7FA0;">All</span>
          <span></span>
        </div>
      </div>
      <div class="ch-right"></div>
    </div>
    <div id="unified-list">
      <div class="empty-state">Loading…</div>
    </div>
  </div>


</main>

<script>
const TOKEN = '__AIRTABLE_TOKEN__';
const BASE  = '__AIRTABLE_BASE__';

const TABLES = {
  production: 'tbloztf6y79U60mqQ',
  employees:  'tblUDcItnhNhe2GgO',
  bol:        'tblXYkzOrce7FIXWI',
};

async function fetchAll(tableId, fields, filterFormula) {
  let records = [], offset = null;
  do {
    let url = `https://api.airtable.com/v0/${BASE}/${tableId}?`;
    if (filterFormula) url += `filterByFormula=${encodeURIComponent(filterFormula)}&`;
    fields.forEach(f => { url += `fields[]=${encodeURIComponent(f)}&`; });
    if (offset) url += `offset=${encodeURIComponent(offset)}&`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'Airtable error');
    records.push(...(data.records || []));
    offset = data.offset || null;
  } while (offset);
  return records;
}

const IGNORED_PROCESSES = [
  'finalcountrawmaterials','finalcountbelts','finalcountaccessories',
  'laser80w','laser80w2','laser155','cleannrollrig',
  'sew','kitting','3d print','testonly','amxcut','daddy/mama',
  'glue','bartackshopc','grommet',
  'snapshopc','ss10hook','serger','trim'
];

function isIgnoredProcess(name) {
  if (!name) return false;
  const lower = name.toLowerCase().replace(/\s+/g, ' ').trim();
  const nospace = name.toLowerCase().replace(/\s+/g, '');
  return IGNORED_PROCESSES.some(ig => lower.startsWith(ig) || nospace.startsWith(ig));
}

function priorityClass(p) {
  const n = parseInt(p);
  if (n === 1) return 'p1';
  if (n === 2) return 'p2';
  if (n === 3) return 'p3';
  if (n === 4) return 'p4';
  if (n === 5) return 'p5';
  return 'p-unknown';
}

function priorityLabel(p) {
  return `${p}`;
}

async function loadData() {
  const overlay = document.getElementById('loading-overlay');
  const errBanner = document.getElementById('error-banner');
  overlay.style.display = 'flex';
  errBanner.style.display = 'none';

  try {
    // 1. Fetch To-Do production records (all priorities, not just 1-5)
    const todoFilter = `OR({Status}="To-Do",{Status}="Partial To-Do")`;
    const [todoRecords, inProgressRecords, employeeRecords] = await Promise.all([
      fetchAll(TABLES.production, ['Bill of Labor', 'Process (Glide)', 'Priority'], todoFilter),
      fetchAll(TABLES.production, ['Bill of Labor', 'Process (Glide)', 'Priority', 'Employee'], '{Status}="In Progress"'),
      fetchAll(TABLES.employees,  ['Full Name', 'Default Qualifications', 'Shop C'], 'NOT({Inactive})'),
    ]);

    // ── Build process groups from To-Do records ──
    // Grouped by process NAME (not BOL ID) so duplicates like "BarTackMain" merge.
    // Map: processName → { bolIds: Set, priorityCounts: {1:N, ...} }
    const processGroups = new Map();
    for (const rec of todoRecords) {
      const bolIds = rec.fields['Bill of Labor'] || [];
      const priority = String(rec.fields['Priority'] || '');
      const processName = rec.fields['Process (Glide)'] || (bolIds.length ? bolIds[0] : null);
      if (!processName) continue;
      if (isIgnoredProcess(processName)) continue;
      if (!processGroups.has(processName)) {
        processGroups.set(processName, { processName, bolIds: new Set(), priorityCounts: {}, totalCount: 0 });
      }
      const group = processGroups.get(processName);
      bolIds.forEach(id => group.bolIds.add(id));
      group.totalCount = (group.totalCount || 0) + 1;
      if (['1','2','3','4','5'].includes(priority)) {
        group.priorityCounts[priority] = (group.priorityCounts[priority] || 0) + 1;
      }
    }

    // ── Build employee map and Shop C set (must come before In Progress loop) ──
    const employeeMap = new Map();
    const shopCEmpIds = new Set();
    for (const rec of employeeRecords) {
      if (rec.fields['Shop C']) {
        shopCEmpIds.add(rec.id);
      } else {
        const name = (rec.fields['Full Name'] || '').trim() || 'Unknown';
        const quals = rec.fields['Default Qualifications'] || [];
        employeeMap.set(rec.id, { name, qualifiedBolIds: new Set(quals) });
      }
    }

    // ── Build In-Progress maps ──
    const inProgressByBol = new Map();         // bolId → Set<employeeId> (non-ignored only)
    const inProgressByProcessName = new Map(); // processName → Set<employeeId> (non-ignored only)
    const employeeInProgress = new Map();       // empId → status (non-ignored processes)
    const allFloorEmployees = new Map();        // empId → status (ALL non-ShopC processes)

    for (const rec of inProgressRecords) {
      const bolIds = rec.fields['Bill of Labor'] || [];
      const empIds = rec.fields['Employee'] || [];
      const priority = String(rec.fields['Priority'] || '');
      const processName = rec.fields['Process (Glide)'] || '';

      // Skip entire task if any assigned employee is Shop C
      if (empIds.some(id => shopCEmpIds.has(id))) continue;

      // Track ALL non-ShopC employees on floor (including ignored processes)
      for (const empId of empIds) {
        if (!allFloorEmployees.has(empId)) {
          allFloorEmployees.set(empId, { bolIds: new Set(), priority, processName, processNames: new Set() });
        }
        const entry = allFloorEmployees.get(empId);
        if (!entry.priority || parseInt(priority) < parseInt(entry.priority)) {
          entry.priority = priority;
          entry.processName = processName;
        }
        if (processName) entry.processNames.add(processName);
        for (const bolId of bolIds) entry.bolIds.add(bolId);
      }

      // Skip ignored processes for the main process-queue tracking
      if (isIgnoredProcess(processName)) continue;

      for (const bolId of bolIds) {
        if (!inProgressByBol.has(bolId)) inProgressByBol.set(bolId, new Set());
        for (const empId of empIds) inProgressByBol.get(bolId).add(empId);
      }
      if (processName) {
        if (!inProgressByProcessName.has(processName)) inProgressByProcessName.set(processName, new Set());
        for (const empId of empIds) inProgressByProcessName.get(processName).add(empId);
      }
      for (const empId of empIds) {
        if (!employeeInProgress.has(empId)) {
          employeeInProgress.set(empId, { bolIds: new Set(), priority, processName, processNames: new Set() });
        }
        const entry = employeeInProgress.get(empId);
        if (!entry.priority || parseInt(priority) < parseInt(entry.priority)) {
          entry.priority = priority;
          entry.processName = processName;
        }
        if (processName) entry.processNames.add(processName);
        for (const bolId of bolIds) entry.bolIds.add(bolId);
      }
    }

    // ── Compute on-floor counts per process group ──
    // Match by BOL ID overlap OR process name — whichever finds the employee
    const qualifiedOnFloor = new Map(); // processName → count
    for (const [procName, group] of processGroups) {
      const onFloorEmpIds = new Set();
      // Match by BOL ID
      for (const bolId of group.bolIds) {
        const emps = inProgressByBol.get(bolId) || new Set();
        for (const empId of emps) {
          if (employeeMap.has(empId)) onFloorEmpIds.add(empId);
        }
      }
      // Also match by process name
      const nameEmps = inProgressByProcessName.get(procName) || new Set();
      for (const empId of nameEmps) {
        if (employeeMap.has(empId)) onFloorEmpIds.add(empId);
      }
      qualifiedOnFloor.set(procName, onFloorEmpIds.size);
    }

    // ── Sort process groups ──
    const sortedGroups = [...processGroups.entries()].sort(([, aG], [, bG]) => {
      const aHasPriority = Object.keys(aG.priorityCounts).length > 0;
      const bHasPriority = Object.keys(bG.priorityCounts).length > 0;
      if (aHasPriority && !bHasPriority) return -1;
      if (!aHasPriority && bHasPriority) return 1;
      if (!aHasPriority && !bHasPriority) return aG.processName.localeCompare(bG.processName);
      const aMinP = Math.min(...Object.keys(aG.priorityCounts).map(Number));
      const bMinP = Math.min(...Object.keys(bG.priorityCounts).map(Number));
      if (aMinP !== bMinP) return aMinP - bMinP;
      const aTotal = Object.values(aG.priorityCounts).reduce((s,n)=>s+n,0);
      const bTotal = Object.values(bG.priorityCounts).reduce((s,n)=>s+n,0);
      return bTotal - aTotal;
    });

    // ── Identify P1 gaps ──
    const p1GapBols = new Set(); // using processName as key here
    for (const [procName, group] of sortedGroups) {
      if (group.priorityCounts['1'] && (qualifiedOnFloor.get(procName) || 0) === 0) {
        p1GapBols.add(procName);
      }
    }

    // ── Identify training opportunities ──
    // For each employee currently In Progress on a lower-priority task,
    // check if they're qualified for a P1/P2 gap process they're NOT currently on
    const opportunities = [];
    for (const [empId, empStatus] of employeeInProgress) {
      const emp = employeeMap.get(empId);
      if (!emp) continue;
      const empPriority = parseInt(empStatus.priority || '9');
      // Only flag if they're on P3+ (lower than P1/P2)
      if (empPriority <= 2) continue;
      for (const [procName, group] of sortedGroups) {
        if (!(group.priorityCounts['1'] || group.priorityCounts['2'])) continue;
        if ((qualifiedOnFloor.get(procName) || 0) > 0) continue;
        // Qualified if emp is qualified for ANY bol in this group
        const isQualified = [...group.bolIds].some(b => emp.qualifiedBolIds.has(b));
        if (!isQualified) continue;
        // Already on it if currently in-progress on any bol in this group
        const alreadyOn = [...group.bolIds].some(b => empStatus.bolIds.has(b));
        if (alreadyOn) continue;
        const p1count = group.priorityCounts['1'] || 0;
        const p2count = group.priorityCounts['2'] || 0;
        if (p1count > 0) {
          opportunities.push({
            empName: emp.name,
            empPriority: empStatus.priority,
            processName: group.processName,
            p1count,
          });
        } else if (p2count > 0) {
          opportunities.push({
            empName: emp.name,
            empPriority: empStatus.priority,
            processName: group.processName,
            p2count,
          });
        }
      }
    }

    // Alert bar intentionally hidden

    // ── Compute p12 gaps ──
    const p12GapBols = new Set([...processGroups.entries()]
      .filter(([procName, g]) => (g.priorityCounts['1'] || g.priorityCounts['2']) && (qualifiedOnFloor.get(procName)||0) === 0)
      .map(([procName]) => procName));

    // ── Map each employee to their matching process group ──
    const processToEmployees = new Map(); // processName → [{empId, empStatus, emp}]
    const matchedEmpIds = new Set();
    for (const [empId, empStatus] of employeeInProgress) {
      const emp = employeeMap.get(empId);
      for (const [procName, group] of processGroups) {
        const bolMatch = [...group.bolIds].some(b => empStatus.bolIds.has(b));
        const nameMatch = empStatus.processNames && empStatus.processNames.has(procName);
        if (bolMatch || nameMatch) {
          if (!processToEmployees.has(procName)) processToEmployees.set(procName, []);
          processToEmployees.get(procName).push({ empId, empStatus, emp });
          matchedEmpIds.add(empId);
          break;
        }
      }
    }

    // Unmatched = all non-ShopC floor employees not matched to a process row
    const unmatchedEmployees = [];
    for (const [empId, empStatus] of allFloorEmployees) {
      if (!matchedEmpIds.has(empId)) {
        const emp = employeeMap.get(empId);
        unmatchedEmployees.push({ empId, empStatus, emp });
      }
    }

    // ── Employee card renderer ──
    function renderEmployeeCards(empList, showProcess) {
      return empList.map(({ empId, empStatus, emp }) => {
        const name = emp ? emp.name : 'Unknown';
        const p = empStatus.priority || '?';
        const pClass = priorityClass(p);
        const empPNum = parseInt(p);
        const isAmber = (empPNum >= 4) && emp && [...p12GapBols].some(procName => {
          const g = processGroups.get(procName);
          if (!g) return false;
          const qualified = [...g.bolIds].some(b => emp.qualifiedBolIds.has(b));
          const alreadyOn = [...g.bolIds].some(b => empStatus.bolIds.has(b));
          return qualified && !alreadyOn;
        });
        const qualTags = emp ? [...processGroups.entries()]
          .filter(([, g]) => [...g.bolIds].some(b => emp.qualifiedBolIds.has(b)))
          .map(([, g]) => `<span class="qual-tag">${escHtml(g.processName)}</span>`)
          .slice(0, 4).join('') : '';
        const amberNote = isAmber ? `<span class="amber-tag">⚡ Qualified for higher-priority gap</span>` : '';
        const currentProcess = showProcess && empStatus.processName
          ? `<div class="current-process">${escHtml(empStatus.processName)}</div>` : '';
        return `
          <div class="employee-card ${isAmber ? 'amber-highlight' : ''}">
            <div class="emp-top">
              <span class="emp-name">${escHtml(name)}</span>
              <span class="priority-badge ${pClass}">${priorityLabel(p)}</span>
            </div>
            ${currentProcess}
            ${amberNote}
            ${qualTags ? `<div class="qual-tags">${qualTags}</div>` : ''}
          </div>`;
      }).join('');
    }

    // ── Render Unified Grid ──
    const unifiedList = document.getElementById('unified-list');
    if (sortedGroups.length === 0 && employeeInProgress.size === 0) {
      unifiedList.innerHTML = '<div class="empty-state">No tasks in queue</div>';
    } else {
      let html = '';
      for (const [procName, group] of sortedGroups) {
        const onFloor = qualifiedOnFloor.get(procName) || 0;
        const hasP1Gap = group.priorityCounts['1'] && onFloor === 0;
        const rowClass = hasP1Gap ? 'unified-row gap-alert' : 'unified-row';
        const floorClass = onFloor === 0 ? 'zero' : 'some';
        const cols = [1,2,3,4,5].map(p => {
          const count = group.priorityCounts[String(p)];
          return `<span class="pcol">${count
            ? `<span class="pill pill-${p}">${count}</span>`
            : `<span class="pill-empty"></span>`
          }</span>`;
        }).join('');
        const priorityTotal = Object.values(group.priorityCounts).reduce((s,n) => s+n, 0);
        const total = group.totalCount || 0;
        const empList = processToEmployees.get(procName) || [];
        html += `
          <div class="${rowClass}">
            <div class="process-cell">
              <div class="process-cell-grid">
                <span class="process-name" title="${escHtml(group.processName)}">${escHtml(group.processName)}</span>
                ${cols}
                <span class="pill-total" style="color:#9CA3AF;">${priorityTotal || ''}</span>
                <span class="pill-total" style="color:#5B7FA0;">${total}</span>
                <span class="on-floor-label ${floorClass}">${onFloor} on floor</span>
              </div>
            </div>
            <div class="employee-cell">
              ${empList.length ? renderEmployeeCards(empList, false) : ''}
            </div>
          </div>`;
      }
      if (unmatchedEmployees.length > 0) {
        html += `<div class="unmatched-divider">On floor — process not in task queue</div>
          <div class="unified-row">
            <div class="process-cell" style="color:var(--steel); font-size:0.8rem; font-style:italic; justify-content:center;">—</div>
            <div class="employee-cell">${renderEmployeeCards(unmatchedEmployees, true)}</div>
          </div>`;
      }
      unifiedList.innerHTML = html;
    }

    // ── Last refresh ──
    document.getElementById('last-refresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
    if (typeof resetCountdown === 'function') resetCountdown();

  } catch (err) {
    const errBanner = document.getElementById('error-banner');
    errBanner.style.display = 'block';
    errBanner.textContent = '⚠️ Error loading data: ' + err.message;
    console.error(err);
  } finally {
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Countdown timer
let countdownSecs = 60;
let countdownTimer = null;

function resetCountdown() {
  countdownSecs = 60;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownSecs--;
    const el = document.getElementById('refresh-countdown');
    if (el) el.textContent = `auto-refresh ${countdownSecs}s`;
    if (countdownSecs <= 0) {
      countdownSecs = 60;
      loadData();
    }
  }, 1000);
}

// Initial load + auto-refresh
loadData();
resetCountdown();
</script>
</body>
</html>
