<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📣 Marketing · Blue Alpha</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f6f9;
    color: #1a1a2e;
    min-height: 100vh;
  }

  .header {
    background: #1B2438;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 1.2rem; font-weight: 700; color: #fff; }
  .header .sub { font-size: 0.78rem; color: #8fa3c0; margin-top: 2px; }

  .page { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  .section-tabs {
    display: flex;
    border-bottom: 2px solid #e2e8f0;
    margin-bottom: 24px;
  }
  .stab {
    padding: 10px 22px;
    border: none; background: none;
    font-size: 0.92rem; font-weight: 600;
    color: #94a3b8; cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }
  .stab.active { color: #1B2438; border-bottom-color: #BD3333; }
  .stab:hover:not(.active) { color: #475569; }
  .cpill {
    background: #e8ecf2; color: #6b7280;
    font-size: 0.7rem; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; margin-left: 5px;
  }

  .toolbar {
    display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap; margin-bottom: 18px;
  }
  .toolbar select, .toolbar input[type=text] {
    padding: 7px 11px;
    border: 1.5px solid #e2e8f0; border-radius: 8px;
    font-size: 0.83rem; color: #374151; background: #fff; outline: none;
  }
  .toolbar select:focus, .toolbar input:focus { border-color: #5B7FA0; }
  .toolbar input[type=text] { width: 190px; }
  .btn-add {
    margin-left: auto;
    padding: 7px 16px;
    background: #BD3333; color: #fff;
    border: none; border-radius: 8px;
    font-size: 0.83rem; font-weight: 700; cursor: pointer;
  }
  .btn-add:hover { background: #a02a2a; }

  /* ---- Campaign card ---- */
  .campaigns-list { display: flex; flex-direction: column; gap: 6px; }

  .ccard {
    background: #fff;
    border: 1.5px solid #e8ecf2;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.12s;
  }
  .ccard:hover { border-color: #c5d3e0; }

  .ccard-top {
    display: flex; align-items: flex-start;
    gap: 10px;
  }

  /* Inline editable subject */
  .f-subject {
    flex: 1;
    font-size: 0.98rem; font-weight: 600; color: #111827;
    line-height: 1.4;
    cursor: text;
    border-radius: 5px;
    padding: 2px 4px;
    margin: -2px -4px;
    transition: background 0.12s;
    min-height: 1.4em;
  }
  .f-subject:hover { background: #f0f4f8; }
  .f-subject:focus { background: #f0f4f8; outline: 2px solid #5B7FA0; outline-offset: 1px; }

  /* Date field */
  .f-date-wrap { flex-shrink: 0; }
  .f-date-display {
    font-size: 0.78rem; color: #6b7280; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    padding: 3px 7px; border-radius: 6px;
    transition: background 0.12s;
    display: inline-block;
  }
  .f-date-display:hover { background: #f0f4f8; }
  .f-date-display.urgent { color: #BD3333; font-weight: 700; }
  .f-date-display.soon   { color: #d97706; font-weight: 700; }
  .f-date-display.nodate { color: #c4c9d4; font-style: italic; }
  input.f-date-input {
    border: 1.5px solid #5B7FA0; border-radius: 6px;
    padding: 3px 6px; font-size: 0.78rem; outline: none;
    background: #f8fafc; font-family: inherit; cursor: pointer;
  }

  .ccard-bottom {
    display: flex; align-items: center;
    justify-content: space-between; gap: 8px; flex-wrap: wrap;
  }
  .ccard-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  /* Inline badge selects */
  .f-badge-wrap { position: relative; display: inline-flex; }
  .badge {
    display: inline-block;
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.71rem; font-weight: 700; color: #fff;
    white-space: nowrap; cursor: pointer;
    transition: filter 0.12s;
  }
  .badge:hover { filter: brightness(0.9); }
  .badge.empty {
    background: #e8ecf2 !important; color: #9ca3af;
    border: 1.5px dashed #d1d5db;
  }
  select.f-badge-select {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0; cursor: pointer;
    font-size: 0; /* hide the text */
  }

  /* File # */
  .f-filenum {
    font-size: 0.75rem; color: #9ca3af; font-weight: 600;
    cursor: text; padding: 2px 5px; border-radius: 5px;
    transition: background 0.12s; white-space: nowrap;
  }
  .f-filenum:hover { background: #f0f4f8; }
  .f-filenum.empty { color: #d1d5db; font-style: italic; }
  input.f-filenum-input {
    width: 64px; padding: 2px 5px;
    border: 1.5px solid #5B7FA0; border-radius: 5px;
    font-size: 0.75rem; outline: none; font-family: inherit;
    background: #f8fafc;
  }

  /* Team dots */
  .team-row { display: flex; align-items: flex-end; gap: 10px; }
  .team-person { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .team-initial { font-size: 0.62rem; color: #aab4c0; font-weight: 700; letter-spacing: 0.02em; }
  .tdot {
    width: 15px; height: 15px; border-radius: 50%;
    border: 1.5px solid rgba(0,0,0,0.1);
    cursor: pointer; transition: transform 0.12s, box-shadow 0.12s;
  }
  .tdot:hover { transform: scale(1.25); box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

  /* ⋯ more button */
  .btn-more {
    margin-left: 4px;
    padding: 3px 8px; border: 1.5px solid #e8ecf2;
    border-radius: 6px; background: #fff;
    font-size: 0.85rem; color: #94a3b8; cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .btn-more:hover { background: #f0f4f8; color: #374151; border-color: #c5d3e0; }

  /* ---- Ideas ---- */
  .ideas-list { display: flex; flex-direction: column; gap: 6px; }
  .icard {
    background: #fff;
    border: 1.5px solid #e8ecf2; border-radius: 10px;
    padding: 13px 18px;
    display: flex; align-items: center; gap: 14px;
    transition: border-color 0.12s;
  }
  .icard:hover { border-color: #c5d3e0; }
  .f-idea-text {
    flex: 1; font-size: 0.92rem; font-weight: 500; color: #111827;
    cursor: text; padding: 2px 4px; border-radius: 5px; margin: -2px -4px;
  }
  .f-idea-text:hover { background: #f0f4f8; }
  .f-idea-text:focus { background: #f0f4f8; outline: 2px solid #5B7FA0; outline-offset: 1px; }
  .icard-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
  .i-submitter { font-size: 0.77rem; color: #6b7280; font-weight: 500; white-space: nowrap; }

  /* ---- Detail drawer (for secondary fields + new records) ---- */
  .backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.2); z-index: 100; backdrop-filter: blur(1px);
  }
  .backdrop.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: -500px;
    width: 460px; max-width: 95vw; height: 100vh;
    background: #fff; z-index: 101; overflow-y: auto;
    transition: right 0.22s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
    box-shadow: -4px 0 20px rgba(0,0,0,0.1);
  }
  .drawer.open { right: 0; }
  .drawer-hdr {
    padding: 18px 22px; border-bottom: 1.5px solid #e8ecf2;
    display: flex; align-items: center; justify-content: space-between;
    background: #f8fafc; position: sticky; top: 0; z-index: 5;
  }
  .drawer-hdr span { font-size: 1rem; font-weight: 700; color: #1a1a2e; }
  .btn-x {
    width: 30px; height: 30px; border: none;
    background: #e8ecf2; border-radius: 50%; cursor: pointer;
    font-size: 1rem; color: #6b7280; display: flex; align-items: center; justify-content: center;
  }
  .btn-x:hover { background: #d1d5db; }
  .drawer-body { padding: 20px 22px; flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .fld { display: flex; flex-direction: column; gap: 4px; }
  .fld label { font-size: 0.72rem; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
  .fld input, .fld select, .fld textarea {
    padding: 8px 11px; border: 1.5px solid #e2e8f0; border-radius: 8px;
    font-size: 0.88rem; color: #374151; background: #fff; outline: none; font-family: inherit;
  }
  .fld input:focus, .fld select:focus, .fld textarea:focus { border-color: #5B7FA0; }
  .fld textarea { resize: vertical; min-height: 68px; }
  .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  .chkrow { display: flex; align-items: center; gap: 7px; font-size: 0.88rem; color: #374151; cursor: pointer; padding: 4px 0; }
  .chkrow input { width: 15px; height: 15px; accent-color: #BD3333; cursor: pointer; }
  .sec-lbl {
    font-size: 0.7rem; font-weight: 700; color: #aab4c0;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding-bottom: 6px; border-bottom: 1px solid #e8ecf2;
  }
  .team-flds { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .drawer-ftr {
    padding: 14px 22px; border-top: 1.5px solid #e8ecf2;
    display: flex; gap: 8px; align-items: center;
    background: #f8fafc; position: sticky; bottom: 0;
  }
  .btn-save {
    flex: 1; padding: 9px; background: #BD3333; color: #fff;
    border: none; border-radius: 8px; font-size: 0.88rem; font-weight: 700; cursor: pointer;
  }
  .btn-save:hover { background: #a02a2a; }
  .btn-cancel {
    padding: 9px 16px; background: #f1f5f9; color: #374151;
    border: none; border-radius: 8px; font-size: 0.88rem; font-weight: 600; cursor: pointer;
  }
  .btn-cancel:hover { background: #e2e8f0; }
  .btn-del {
    padding: 9px 12px; background: none; color: #ef4444;
    border: 1.5px solid #fecaca; border-radius: 8px;
    font-size: 0.83rem; font-weight: 600; cursor: pointer;
  }
  .btn-del:hover { background: #fee2e2; }

  /* Empty */
  .empty { text-align: center; padding: 56px 20px; color: #94a3b8; }
  .empty .ei { font-size: 2.2rem; margin-bottom: 10px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: #1a1a2e; color: #fff;
    padding: 9px 18px; border-radius: 8px;
    font-size: 0.85rem; font-weight: 500; z-index: 200;
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Saving indicator */
  .saving-ring {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid #e2e8f0; border-top-color: #5B7FA0;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-left: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📣 Marketing</h1>

</div>

<div class="page">

<script>
const AT_TOKEN = '__PATTY_TOKEN__';
const BASE_ID  = 'appTCZwoETAInVuiX';
const C_TABLE  = 'tblxj6Nouo4DfzVwA';
const I_TABLE  = 'tbldunjKUpRLtZAqW';

let campaigns = [], ideas = [];
let editCId = null, editIId = null, activeDrawer = null;

// ---- Airtable ----
async function atFetch(table, params) {
  let recs = [], off = null;
  do {
    const p = off ? `${params}&offset=${off}` : params;
    const r = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${table}?${p}`,
      { headers: { Authorization: `Bearer ${AT_TOKEN}` } });
    const d = await r.json();
    recs = recs.concat(d.records || []);
    off = d.offset;
  } while (off);
  return recs;
}
async function atPatch(table, id, fields) {
  const r = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${table}/${id}`,
    { method: 'PATCH',
      headers: { Authorization: `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields }) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function atCreate(table, fields) {
  const r = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${table}`,
    { method: 'POST',
      headers: { Authorization: `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields }) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function atDelete(table, id) {
  await fetch(`https://api.airtable.com/v0/${BASE_ID}/${table}/${id}`,
    { method: 'DELETE', headers: { Authorization: `Bearer ${AT_TOKEN}` } });
}

// ---- Colors ----
const SC = { Idea:'#94a3b8', Planning:'#f59e0b', 'In Progress':'#3b82f6', Ready:'#8b5cf6', Sent:'#22c55e' };
const TC = { 'New Product':'#3b82f6', General:'#6b7280', YouTube:'#ef4444', 'Limited Run':'#10b981' };
const IC = { New:'#6b7280', Considering:'#f59e0b', Approved:'#3b82f6', Scheduled:'#8b5cf6', Declined:'#ef4444' };
const CC = { 'New BA Product':'#3b82f6', 'Limited Run':'#10b981', 'Custom Shop':'#f59e0b',
             YouTube:'#ef4444', 'New Other Product':'#6366f1', General:'#6b7280' };
const DC = { Done:'#22c55e', 'In Progress':'#f59e0b', 'Not Started':'#d1d5db', 'N/A':'#c4b5fd' };
const DOT_CYCLE = ['Not Started','In Progress','Done','N/A',''];

const TEAM = [
  ['S',   'Stephen - Content'],
  ['K📷', 'Kurt - Photos'],
  ['K▶',  'Kurt - YouTube'],
  ['Ke',  'Kelly - Listing'],
  ['P',   'Patty - Email'],
  ['C',   'Chris - SKU/BOM/BOL'],
];

function fmtDate(ds) {
  if (!ds) return { html: '<span class="f-date-display nodate">No date</span>', raw: '' };
  const d = new Date(ds + 'T12:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  let cls = 'f-date-display';
  if (diff >= 0 && diff <= 3) cls += ' urgent';
  else if (diff > 3 && diff <= 7) cls += ' soon';
  return { html: `<span class="${cls}">${label}</span>`, raw: ds };
}

function badgeHtml(val, map, opts) {
  const bg = map[val];
  if (!val || !bg) return `<span class="badge empty">${opts[0] || '—'}</span>`;
  return `<span class="badge" style="background:${bg}">${val}</span>`;
}

// ---- Section ----
function showSection(name) {
  ['campaigns','ideas'].forEach(s => {
    document.getElementById(`sec-${s}`).style.display = s === name ? '' : 'none';
    document.getElementById(`stab-${s}`).classList.toggle('active', s === name);
  });
}

// ---- Render campaigns ----
function renderCampaigns() {
  const sf = document.getElementById('fil-status').value;
  const tf = document.getElementById('fil-type').value;
  const q  = document.getElementById('fil-search').value.toLowerCase();
  const data = campaigns.filter(r => {
    const f = r.fields;
    if (sf && f.Status !== sf) return false;
    if (tf && f.Type   !== tf) return false;
    if (q && !(f['Subject / Topic']||'').toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('cnt-campaigns').textContent = data.length;
  const el = document.getElementById('campaigns-list');
  if (!data.length) {
    el.innerHTML = `<div class="empty"><div class="ei">📭</div><p>No campaigns match.</p></div>`;
    return;
  }

  el.innerHTML = data.map(rec => {
    const f = rec.fields;
    const id = rec.id;
    const dateInfo = fmtDate(f['Send Date']);

    const statusBadge = badgeHtml(f.Status, SC, ['Status']);
    const typeBadge   = badgeHtml(f.Type,   TC, ['Type']);

    const teamDots = TEAM.map(([init, field]) => {
      const val = f[field] || '';
      const bg  = DC[val] || '#e5e7eb';
      return `<div class="team-person">
        <span class="team-initial">${init}</span>
        <div class="tdot" style="background:${bg}" title="${init}: ${val||'—'}"
          data-action="dot" data-id="${id}" data-field="${field}" data-val="${val}"></div>
      </div>`;
    }).join('');

    const fileNum = f['File #']
      ? `<span class="f-filenum" data-action="edit-file" data-id="${id}" data-val="${f['File #']}">#${f['File #']}</span>`
      : `<span class="f-filenum empty" data-action="edit-file" data-id="${id}" data-val="">File#</span>`;

    return `<div class="ccard">
      <div class="ccard-top">
        <div class="f-subject" contenteditable="true" spellcheck="false"
          data-action="edit-subject" data-id="${id}"
          data-orig="${escHtml(f['Subject / Topic']||'')}"
        >${escHtml(f['Subject / Topic']||'')}</div>
        <div class="f-date-wrap" data-action="edit-date" data-id="${id}" data-val="${f['Send Date']||''}"
          style="cursor:pointer">${dateInfo.html}</div>
      </div>
      <div class="ccard-bottom">
        <div class="ccard-meta">
          <div class="f-badge-wrap" title="Click to change status">
            ${statusBadge}
            <select class="f-badge-select" data-action="edit-status" data-id="${id}">
              ${['','Idea','Planning','In Progress','Ready','Sent'].map(o=>
                `<option value="${o}" ${f.Status===o?'selected':''}>${o||'— Status —'}</option>`).join('')}
            </select>
          </div>
          <div class="f-badge-wrap" title="Click to change type">
            ${typeBadge}
            <select class="f-badge-select" data-action="edit-type" data-id="${id}">
              ${['','New Product','General','YouTube','Limited Run'].map(o=>
                `<option value="${o}" ${f.Type===o?'selected':''}>${o||'— Type —'}</option>`).join('')}
            </select>
          </div>
          ${fileNum}
        </div>
        <div style="display:flex;align-items:flex-end;gap:10px">
          <div class="team-row">${teamDots}</div>
          <button class="btn-more" data-action="open-more" data-id="${id}" title="Notes, revenue, social…">⋯</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ---- Event delegation ----
document.addEventListener('change', async e => {
  const sel = e.target;
  const action = sel.dataset.action;
  if (!action) return;
  const id = sel.dataset.id;
  const val = sel.value;

  if (action === 'edit-status') await quickSave(C_TABLE, id, { Status: val }, campaigns);
  if (action === 'edit-type')   await quickSave(C_TABLE, id, { Type: val }, campaigns);
  if (action === 'edit-icat')   await quickSave(I_TABLE, id, { Category: val }, ideas);
  if (action === 'edit-istatus') await quickSave(I_TABLE, id, { Status: val }, ideas);
});

document.addEventListener('click', async e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id;

  if (action === 'dot') {
    const cur = el.dataset.val;
    const idx = DOT_CYCLE.indexOf(cur);
    const next = DOT_CYCLE[(idx + 1) % DOT_CYCLE.length];
    const field = el.dataset.field;
    const fields = {}; fields[field] = next || null;
    // Optimistic update
    el.style.background = DC[next] || '#e5e7eb';
    el.dataset.val = next;
    el.title = el.closest('.team-person').querySelector('.team-initial').textContent + ': ' + (next||'—');
    await quickSave(C_TABLE, id, fields, campaigns, false);
  }

  if (action === 'edit-date') {
    const wrap = el.closest ? el : el.parentElement;
    if (wrap.querySelector('input')) return;
    const cur = el.dataset ? el.dataset.val : (wrap.dataset.val || '');
    const inp = document.createElement('input');
    inp.type = 'date'; inp.className = 'f-date-input'; inp.value = cur;
    wrap.innerHTML = '';
    wrap.appendChild(inp);
    inp.focus();
    const doSave = async () => {
      const v = inp.value;
      await quickSave(C_TABLE, id, { 'Send Date': v || null }, campaigns);
    };
    inp.addEventListener('blur', doSave);
    inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') inp.blur(); if (ev.key === 'Escape') { inp.blur(); } });
    return;
  }

  if (action === 'edit-file') {
    if (el.querySelector('input')) return;
    const cur = el.dataset.val || '';
    const orig = el.outerHTML;
    const inp = document.createElement('input');
    inp.type = 'number'; inp.className = 'f-filenum-input'; inp.value = cur; inp.placeholder = 'File #';
    el.replaceWith(inp);
    inp.focus(); inp.select();
    const doSave = async () => {
      const v = inp.value.trim();
      await quickSave(C_TABLE, id, { 'File #': v ? parseInt(v) : null }, campaigns, true);
    };
    inp.addEventListener('blur', doSave);
    inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') inp.blur(); });
    return;
  }

  if (action === 'open-more') { openCDrawer(id, true); return; }
  if (action === 'open-imore') { openIDrawer(id, true); return; }
});

// Contenteditable blur → save
document.addEventListener('focusout', async e => {
  const el = e.target;
  const action = el.dataset.action;
  if (!action) return;
  const id = el.dataset.id;
  const val = el.textContent.trim();
  const orig = el.dataset.orig || '';

  if (action === 'edit-subject' && val !== orig) {
    el.dataset.orig = val;
    await quickSave(C_TABLE, id, { 'Subject / Topic': val }, campaigns, true);
  }
  if (action === 'edit-idea' && val !== orig) {
    el.dataset.orig = val;
    await quickSave(I_TABLE, id, { Idea: val }, ideas, true);
  }
});

// Prevent newlines in contenteditable subject
document.addEventListener('keydown', e => {
  if ((e.target.dataset.action === 'edit-subject' || e.target.dataset.action === 'edit-idea')
      && e.key === 'Enter') {
    e.preventDefault();
    e.target.blur();
  }
});

// ---- Quick save ----
async function quickSave(table, id, fields, arr, rerender = true) {
  try {
    const rec = await atPatch(table, id, fields);
    // Update local cache
    const idx = arr.findIndex(r => r.id === id);
    if (idx !== -1) Object.assign(arr[idx].fields, fields);
    if (rerender) {
      if (arr === campaigns) renderCampaigns();
      else renderIdeas();
    }
    showToast('Saved ✓');
  } catch(err) {
    showToast('Save failed: ' + err.message);
  }
}

// ---- Campaign drawer ----
function openCDrawer(id, moreOnly) {
  editCId = id;
  document.getElementById('cdrawer-title').textContent = id ? (moreOnly ? 'Campaign Details' : 'Edit Campaign') : 'Add Campaign';
  document.getElementById('cd-delbtn').style.display = id ? 'inline-block' : 'none';
  const f = id ? (campaigns.find(r => r.id === id)||{}).fields||{} : {};
  document.getElementById('cd-subject').value   = f['Subject / Topic']||'';
  document.getElementById('cd-type').value      = f.Type||'';
  document.getElementById('cd-status').value    = f.Status||'';
  document.getElementById('cd-date').value      = f['Send Date']||'';
  document.getElementById('cd-file').value      = f['File #']||'';
  document.getElementById('cd-revenue').value   = f.Revenue||'';
  document.getElementById('cd-social').checked  = !!f['Social Posts'];
  document.getElementById('cd-waitlist').checked= !!f['Waitlist / Dealer / Agency'];
  document.getElementById('cd-stephen').value   = f['Stephen - Content']||'';
  document.getElementById('cd-kp').value        = f['Kurt - Photos']||'';
  document.getElementById('cd-ky').value        = f['Kurt - YouTube']||'';
  document.getElementById('cd-kelly').value     = f['Kelly - Listing']||'';
  document.getElementById('cd-patty').value     = f['Patty - Email']||'';
  document.getElementById('cd-chris').value     = f['Chris - SKU/BOM/BOL']||'';
  document.getElementById('cd-notes').value     = f.Notes||'';
  openDrawer('cdrawer');
}

async function saveCampaign() {
  const sub = document.getElementById('cd-subject').value.trim();
  if (!sub) { showToast('Subject is required'); return; }
  const fields = { 'Subject / Topic': sub };
  const v = (eid, key) => { const val = document.getElementById(eid).value; if (val) fields[key] = val; };
  v('cd-type','Type'); v('cd-date','Send Date'); v('cd-status','Status');
  const fn = document.getElementById('cd-file').value; if (fn) fields['File #'] = parseInt(fn);
  const rv = document.getElementById('cd-revenue').value; if (rv) fields.Revenue = parseFloat(rv);
  fields['Social Posts'] = document.getElementById('cd-social').checked;
  fields['Waitlist / Dealer / Agency'] = document.getElementById('cd-waitlist').checked;
  v('cd-stephen','Stephen - Content'); v('cd-kp','Kurt - Photos');
  v('cd-ky','Kurt - YouTube');         v('cd-kelly','Kelly - Listing');
  v('cd-patty','Patty - Email');       v('cd-chris','Chris - SKU/BOM/BOL');
  const notes = document.getElementById('cd-notes').value.trim(); if (notes) fields.Notes = notes;
  try {
    if (editCId) await atPatch(C_TABLE, editCId, fields);
    else         await atCreate(C_TABLE, fields);
    closeDrawer();
    campaigns = await atFetch(C_TABLE, 'sort[0][field]=Send+Date&sort[0][direction]=asc');
    renderCampaigns();
    showToast('Campaign saved ✓');
  } catch(err) { showToast('Error: ' + err.message); }
}

async function deleteCampaign() {
  if (!editCId || !confirm('Delete this campaign?')) return;
  try {
    await atDelete(C_TABLE, editCId);
    closeDrawer();
    campaigns = await atFetch(C_TABLE, 'sort[0][field]=Send+Date&sort[0][direction]=asc');
    renderCampaigns();
    showToast('Deleted');
  } catch(err) { showToast('Error: ' + err.message); }
}

// ---- Idea drawer ----
function openIDrawer(id, moreOnly) {
  editIId = id;
  document.getElementById('idrawer-title').textContent = id ? 'Edit Idea' : 'Add Idea';
  document.getElementById('id-delbtn').style.display = id ? 'inline-block' : 'none';

  document.getElementById('id-campaign').value = f.Campaign||'';
  document.getElementById('id-notes').value    = f.Notes||'';

}

async function saveIdea() {
  const idea = document.getElementById('id-idea').value.trim();

  const fields = { Idea: idea };
  const v = (eid, key) => { const val = document.getElementById(eid).value; if (val) fields[key] = val; };

  v('id-by','Submitted By'); v('id-campaign','Campaign');

    showToast('Idea saved ✓');
  } catch(err) { showToast('Error: ' + err.message); }

async function deleteIdea() {
  if (!editIId || !confirm('Delete this idea?')) return;
  try {
    await atDelete(I_TABLE, editIId);
    closeDrawer();
    ideas = await atFetch(I_TABLE, '');

// ---- Drawer utils ----
function openDrawer(id) {
  closeDrawer();
  activeDrawer = id;
  document.getElementById('bdrop').classList.add('open');
  document.getElementById(id).classList.add('open');
}
function closeDrawer() {
  if (activeDrawer) document.getElementById(activeDrawer).classList.remove('open');
  document.getElementById('bdrop').classList.remove('open');
  activeDrawer = null;
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

// ---- Toast ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// ---- Escape HTML ----
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Init ----
(async () => {
  document.getElementById('campaigns-list').innerHTML =
    `<div class="empty"><div class="ei">⏳</div><p>Loading...</p></div>`;
  [campaigns, ideas] = await Promise.all([
    atFetch(C_TABLE, 'sort[0][field]=Send+Date&sort[0][direction]=asc'),
    atFetch(I_TABLE, '')
  ]);
  renderCampaigns();
  renderIdeas();
})();
