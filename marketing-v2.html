<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📣 Marketing · Blue Alpha</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#111827;min-height:100vh}

/* ── Header ── */
.hdr{background:#1B2438;padding:0 28px;display:flex;align-items:center;gap:0;height:54px}
.hdr-logo{font-size:1rem;font-weight:800;color:#fff;letter-spacing:-.3px;margin-right:32px;white-space:nowrap}
.hdr-logo span{color:#BD3333}
.hdr-tabs{display:flex;height:100%;gap:0}
.hdr-tab{padding:0 20px;border:none;background:none;font-size:.85rem;font-weight:600;color:#8fa3c0;cursor:pointer;border-bottom:3px solid transparent;transition:color .15s}
.hdr-tab.active{color:#fff;border-bottom-color:#BD3333}
.hdr-tab:hover:not(.active){color:#c5d3e0}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.hdr-search{background:rgba(255,255,255,.1);border:none;border-radius:20px;padding:6px 14px;font-size:.82rem;color:#fff;outline:none;width:180px}
.hdr-search::placeholder{color:#6b8099}
.hdr-search:focus{background:rgba(255,255,255,.15)}
.btn-new{background:#BD3333;color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-new:hover{background:#a02a2a}

/* ── Status pills ── */
.pills-bar{padding:18px 28px 0;display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:6px 16px;border-radius:20px;border:2px solid transparent;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;background:#fff;color:#6b7280;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pill:hover{border-color:currentColor}
.pill.active{color:#fff;border-color:transparent}
.pill[data-s="all"]          {color:#1B2438}
.pill[data-s="all"].active   {background:#1B2438}
.pill[data-s="In Progress"]  {color:#3b82f6}
.pill[data-s="In Progress"].active{background:#3b82f6;color:#fff}
.pill[data-s="Ready"]        {color:#8b5cf6}
.pill[data-s="Ready"].active {background:#8b5cf6;color:#fff}
.pill[data-s="Planning"]     {color:#f59e0b}
.pill[data-s="Planning"].active{background:#f59e0b;color:#fff}
.pill[data-s="Idea"]         {color:#94a3b8}
.pill[data-s="Idea"].active  {background:#94a3b8;color:#fff}
.pill[data-s="Sent"]         {color:#22c55e}
.pill[data-s="Sent"].active  {background:#22c55e;color:#fff}

/* ── Main content ── */
.main{padding:18px 28px 40px}

/* ── Group section ── */
.group{margin-bottom:24px}
.group-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.group-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#6b7280}
.group-count{font-size:.7rem;font-weight:700;background:#e8ecf2;color:#9ca3af;padding:2px 8px;border-radius:20px}
.group-line{flex:1;height:1px;background:#e8ecf2}

/* ── Campaign row ── */
.crow{
  background:#fff;border-radius:10px;
  display:grid;
  grid-template-columns:4px 1fr auto;
  margin-bottom:5px;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
  transition:box-shadow .15s;
  border:1.5px solid #edf0f5;
}
.crow:hover{box-shadow:0 3px 10px rgba(0,0,0,.09);border-color:#d5dbe6}

.crow-accent{border-radius:0}
.crow-body{padding:12px 16px;display:flex;flex-direction:column;gap:8px;min-width:0}
.crow-top{display:flex;align-items:flex-start;gap:10px}

.f-subject{
  font-size:.97rem;font-weight:600;color:#111827;line-height:1.35;flex:1;
  cursor:text;border-radius:4px;padding:1px 4px;margin:-1px -4px;
  transition:background .12s;outline:none;
}
.f-subject:hover{background:#f0f4f8}
.f-subject:focus{background:#eef3f9;outline:2px solid #5B7FA0;outline-offset:0}

.type-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;font-size:.68rem;font-weight:700;color:#fff;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:filter .12s}
.type-badge:hover{filter:brightness(.9)}
.type-badge.empty{background:#e8ecf2!important;color:#9ca3af;border:1.5px dashed #d1d5db}

.crow-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}

/* Team dots */
.team-strip{display:flex;gap:8px;align-items:flex-end}
.tp{display:flex;flex-direction:column;align-items:center;gap:2px}
.ti{font-size:.58rem;font-weight:700;color:#b0bbc8;letter-spacing:.02em}
.td{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(0,0,0,.09);cursor:pointer;transition:transform .12s,box-shadow .12s;flex-shrink:0}
.td:hover{transform:scale(1.3);box-shadow:0 2px 5px rgba(0,0,0,.15)}

/* Date + meta right side */
.crow-right{padding:12px 14px 12px 8px;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:6px;min-width:100px}
.f-date{font-size:.77rem;font-weight:600;color:#9ca3af;white-space:nowrap;cursor:pointer;padding:3px 7px;border-radius:6px;text-align:right}
.f-date:hover{background:#f0f4f8}
.f-date.urgent{color:#BD3333;font-weight:800}
.f-date.soon{color:#d97706;font-weight:700}
.f-date.nodate{color:#d1d5db;font-style:italic;font-weight:400}
input.f-date-inp{border:1.5px solid #5B7FA0;border-radius:6px;padding:3px 6px;font-size:.77rem;outline:none;background:#f8fafc;font-family:inherit;width:130px}

.f-filenum{font-size:.72rem;color:#c4c9d4;font-weight:600;cursor:text;padding:2px 5px;border-radius:4px;text-align:right}
.f-filenum:hover{background:#f0f4f8;color:#9ca3af}
.f-filenum.has-val{color:#9ca3af}
input.f-file-inp{border:1.5px solid #5B7FA0;border-radius:5px;padding:2px 5px;font-size:.72rem;outline:none;font-family:inherit;width:64px;text-align:right;background:#f8fafc}

.btn-more{border:1.5px solid #e8ecf2;border-radius:6px;background:#fff;font-size:.8rem;color:#b0bbc8;cursor:pointer;padding:3px 9px;transition:all .12s}
.btn-more:hover{background:#f0f4f8;color:#374151;border-color:#c5d3e0}

/* Overlay badge select */
.badge-wrap{position:relative;display:inline-flex}
.badge-over{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;font-size:0}

/* ── IDEAS GRID ── */
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.icard{
  background:#fff;border-radius:10px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.05);border:1.5px solid #edf0f5;
  display:flex;flex-direction:column;
  transition:box-shadow .15s,border-color .15s;cursor:pointer;
}
.icard:hover{box-shadow:0 3px 10px rgba(0,0,0,.09);border-color:#d5dbe6}
.icard-top{height:5px;flex-shrink:0}
.icard-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:10px}
.f-idea{font-size:.9rem;font-weight:500;color:#111827;line-height:1.45;flex:1;cursor:text;border-radius:4px;padding:1px 3px;margin:-1px -3px;outline:none}
.f-idea:hover{background:#f0f4f8}
.f-idea:focus{background:#eef3f9;outline:2px solid #5B7FA0;outline-offset:0}
.icard-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.i-sub{font-size:.73rem;color:#9ca3af;font-weight:500}
.sm-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.67rem;font-weight:700;color:#fff;white-space:nowrap;cursor:pointer}
.sm-badge.empty{background:#e8ecf2!important;color:#9ca3af;border:1.5px dashed #d1d5db}

/* ── Empty state ── */
.empty{text-align:center;padding:52px 20px;color:#94a3b8}
.empty .ei{font-size:2.2rem;margin-bottom:10px}

/* ── Drawer ── */
.bdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:100;backdrop-filter:blur(2px)}
.bdrop.open{display:block}
.drawer{position:fixed;top:0;right:-480px;width:460px;max-width:95vw;height:100vh;background:#fff;z-index:101;overflow-y:auto;transition:right .22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
.drawer.open{right:0}
.d-hdr{padding:18px 22px;border-bottom:1.5px solid #edf0f5;display:flex;align-items:center;justify-content:space-between;background:#f8fafc;position:sticky;top:0;z-index:5}
.d-hdr span{font-size:1rem;font-weight:700;color:#1a1a2e}
.d-x{width:30px;height:30px;border:none;background:#e8ecf2;border-radius:50%;cursor:pointer;font-size:.95rem;color:#6b7280;display:flex;align-items:center;justify-content:center}
.d-x:hover{background:#d1d5db}
.d-body{padding:20px 22px;flex:1;display:flex;flex-direction:column;gap:14px}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:.7rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em}
.fld input,.fld select,.fld textarea{padding:8px 11px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.88rem;color:#374151;background:#fff;outline:none;font-family:inherit}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:#5B7FA0}
.fld textarea{resize:vertical;min-height:66px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.sec{font-size:.68rem;font-weight:800;color:#b0bbc8;text-transform:uppercase;letter-spacing:.1em;padding-bottom:6px;border-bottom:1px solid #edf0f5}
.team-flds{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.chkrow{display:flex;align-items:center;gap:7px;font-size:.87rem;color:#374151;cursor:pointer;padding:3px 0}
.chkrow input{width:15px;height:15px;accent-color:#BD3333;cursor:pointer}
.d-ftr{padding:14px 22px;border-top:1.5px solid #edf0f5;display:flex;gap:8px;align-items:center;background:#f8fafc;position:sticky;bottom:0}
.d-save{flex:1;padding:9px;background:#BD3333;color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer}
.d-save:hover{background:#a02a2a}
.d-cancel{padding:9px 14px;background:#f1f5f9;color:#374151;border:none;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer}
.d-cancel:hover{background:#e2e8f0}
.d-del{padding:9px 12px;background:none;color:#ef4444;border:1.5px solid #fecaca;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer}
.d-del:hover{background:#fee2e2}

/* ── Toast ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:#1B2438;color:#fff;padding:9px 20px;border-radius:8px;font-size:.84rem;font-weight:500;z-index:300;transition:transform .25s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">BLUE <span>ALPHA</span> · Marketing</div>
  <div class="hdr-tabs">
    <button class="hdr-tab active" id="htab-c" onclick="showTab('campaigns')">Campaigns</button>
    <button class="hdr-tab" id="htab-i" onclick="showTab('ideas')">Ideas <span id="cnt-ideas" style="font-size:.7rem;opacity:.7"></span></button>
  </div>
  <div class="hdr-right">
    <input type="text" class="hdr-search" id="hdr-search" placeholder="Search…" oninput="onSearch()">
    <button class="btn-new" id="btn-new" onclick="openNew()">+ New</button>
  </div>
</div>

<!-- Campaigns tab -->
<div id="tab-campaigns">
  <div class="pills-bar" id="pills-bar">
    <button class="pill active" data-s="all" onclick="setPill(this)">All <span id="cnt-all"></span></button>
    <button class="pill" data-s="In Progress" onclick="setPill(this)">In Progress <span id="cnt-inp"></span></button>
    <button class="pill" data-s="Ready" onclick="setPill(this)">Ready <span id="cnt-ready"></span></button>
    <button class="pill" data-s="Planning" onclick="setPill(this)">Planning <span id="cnt-plan"></span></button>
    <button class="pill" data-s="Idea" onclick="setPill(this)">Idea <span id="cnt-idea"></span></button>
    <button class="pill" data-s="Sent" onclick="setPill(this)">Sent <span id="cnt-sent"></span></button>
  </div>
  <div class="main" id="campaigns-main"></div>
</div>

<!-- Ideas tab -->
<div id="tab-ideas" style="display:none">
  <div class="main">
    <div class="ideas-grid" id="ideas-grid"></div>
  </div>
</div>

<!-- Drawer backdrop -->
<div class="bdrop" id="bdrop" onclick="closeDrawer()"></div>

<!-- Campaign drawer -->
<div class="drawer" id="cdrawer">
  <div class="d-hdr"><span id="cd-title">Add Campaign</span><button class="d-x" onclick="closeDrawer()">✕</button></div>
  <div class="d-body">
    <div class="fld"><label>Subject / Topic *</label><input type="text" id="cd-subject"></div>
    <div class="frow">
      <div class="fld"><label>Type</label><select id="cd-type"><option value="">—</option><option>New Product</option><option>General</option><option>YouTube</option><option>Limited Run</option></select></div>
      <div class="fld"><label>Status</label><select id="cd-status"><option value="">—</option><option>Idea</option><option>Planning</option><option>In Progress</option><option>Ready</option><option>Sent</option></select></div>
    </div>
    <div class="frow">
      <div class="fld"><label>Send Date</label><input type="date" id="cd-date"></div>
      <div class="fld"><label>File #</label><input type="number" id="cd-file"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>Revenue ($)</label><input type="number" id="cd-revenue" step=".01"></div>
      <div class="fld" style="justify-content:flex-end;padding-top:18px">
        <label class="chkrow"><input type="checkbox" id="cd-social"> Social Posts</label>
        <label class="chkrow"><input type="checkbox" id="cd-waitlist"> Waitlist / Dealer / Agency</label>
      </div>
    </div>
    <div class="sec">Team Task Status</div>
    <div class="team-flds">
      <div class="fld"><label>Stephen – Content</label><select id="cd-stephen"><option value="">—</option><option>Not Started</option><option>In Progress</option><option>Done</option><option>N/A</option></select></div>
      <div class="fld"><label>Kurt – Photos</label><select id="cd-kp"><option value="">—</option><option>Not Started</option><option>In Progress</option><option>Done</option><option>N/A</option></select></div>
      <div class="fld"><label>Kurt – YouTube</label><select id="cd-ky"><option value="">—</option><option>Not Started</option><option>In Progress</option><option>Done</option><option>N/A</option></select></div>
      <div class="fld"><label>Kelly – Listing</label><select id="cd-kelly"><option value="">—</option><option>Not Started</option><option>In Progress</option><option>Done</option><option>N/A</option></select></div>
      <div class="fld"><label>Patty – Email</label><select id="cd-patty"><option value="">—</option><option>Not Started</option><option>In Progress</option><option>Done</option><option>N/A</option></select></div>
      <div class="fld"><label>Chris – SKU/BOM/BOL</label><select id="cd-chris"><option value="">—</option><option>Not Started</option><option>In Progress</option><option>Done</option><option>N/A</option></select></div>
    </div>
    <div class="fld"><label>Notes</label><textarea id="cd-notes"></textarea></div>
  </div>
  <div class="d-ftr">
    <button class="d-del" id="cd-del" onclick="delCampaign()" style="display:none">Delete</button>
    <button class="d-cancel" onclick="closeDrawer()">Cancel</button>
    <button class="d-save" onclick="saveCampaign()">Save Campaign</button>
  </div>
</div>

<!-- Idea drawer -->
<div class="drawer" id="idrawer">
  <div class="d-hdr"><span id="id-title">Add Idea</span><button class="d-x" onclick="closeDrawer()">✕</button></div>
  <div class="d-body">
    <div class="fld"><label>Idea *</label><textarea id="id-idea" style="min-height:88px"></textarea></div>
    <div class="frow">
      <div class="fld"><label>Category</label><select id="id-cat"><option value="">—</option><option>New BA Product</option><option>Limited Run</option><option>Custom Shop</option><option>YouTube</option><option>New Other Product</option><option>General</option></select></div>
      <div class="fld"><label>Status</label><select id="id-status"><option value="">—</option><option>New</option><option>Considering</option><option>Approved</option><option>Scheduled</option><option>Declined</option></select></div>
    </div>
    <div class="frow">
      <div class="fld"><label>Submitted By</label><select id="id-by"><option value="">—</option><option>Stephen</option><option>Kurt</option><option>Jesse</option><option>Kelly</option><option>Patty</option><option>Chris</option></select></div>
      <div class="fld"><label>Linked Campaign</label><input type="text" id="id-campaign"></div>
    </div>
    <div class="fld"><label>Notes</label><textarea id="id-notes"></textarea></div>
  </div>
  <div class="d-ftr">
    <button class="d-del" id="id-del" onclick="delIdea()" style="display:none">Delete</button>
    <button class="d-cancel" onclick="closeDrawer()">Cancel</button>
    <button class="d-save" onclick="saveIdea()">Save Idea</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOK   = '__PATTY_TOKEN__';
const BASE  = 'appTCZwoETAInVuiX';
const CT    = 'tblxj6Nouo4DfzVwA';
const IT    = 'tbldunjKUpRLtZAqW';

let campaigns=[], ideas=[], activePill='all', searchQ='', activeTab='campaigns';
let editCId=null, editIId=null, activeDrawer=null;

/* ── Airtable ── */
async function atFetch(tbl,p){
  let recs=[],off=null;
  do{
    const url=`https://api.airtable.com/v0/${BASE}/${tbl}?${off?p+'&offset='+off:p}`;
    const d=await(await fetch(url,{headers:{Authorization:'Bearer '+TOK}})).json();
    recs=recs.concat(d.records||[]);off=d.offset;
  }while(off);return recs;
}
async function atPatch(tbl,id,fields){
  const r=await fetch(`https://api.airtable.com/v0/${BASE}/${tbl}/${id}`,{method:'PATCH',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},body:JSON.stringify({fields})});
  if(!r.ok)throw new Error(await r.text());return r.json();
}
async function atCreate(tbl,fields){
  const r=await fetch(`https://api.airtable.com/v0/${BASE}/${tbl}`,{method:'POST',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},body:JSON.stringify({fields})});
  if(!r.ok)throw new Error(await r.text());return r.json();
}
async function atDel(tbl,id){await fetch(`https://api.airtable.com/v0/${BASE}/${tbl}/${id}`,{method:'DELETE',headers:{Authorization:'Bearer '+TOK}});}

/* ── Colors ── */
const SC={Idea:'#94a3b8',Planning:'#f59e0b','In Progress':'#3b82f6',Ready:'#8b5cf6',Sent:'#22c55e'};
const TC={'New Product':'#3b82f6',General:'#6b7280',YouTube:'#ef4444','Limited Run':'#10b981'};
const IC={New:'#6b7280',Considering:'#f59e0b',Approved:'#3b82f6',Scheduled:'#8b5cf6',Declined:'#ef4444'};
const CC={'New BA Product':'#3b82f6','Limited Run':'#10b981','Custom Shop':'#f59e0b',YouTube:'#ef4444','New Other Product':'#6366f1',General:'#6b7280'};
const DC={Done:'#22c55e','In Progress':'#f59e0b','Not Started':'#d1d5db','N/A':'#c4b5fd'};
const DCYCLE=['Not Started','In Progress','Done','N/A',''];
const TEAM=[['S','Stephen - Content'],['K📷','Kurt - Photos'],['K▶','Kurt - YouTube'],['Ke','Kelly - Listing'],['P','Patty - Email'],['C','Chris - SKU/BOM/BOL']];
const STATUS_ORDER=['In Progress','Ready','Planning','Idea','Sent'];

/* ── Tab ── */
function showTab(t){
  activeTab=t;
  document.getElementById('tab-campaigns').style.display=t==='campaigns'?'':'none';
  document.getElementById('tab-ideas').style.display=t==='ideas'?'':'none';
  document.getElementById('htab-c').classList.toggle('active',t==='campaigns');
  document.getElementById('htab-i').classList.toggle('active',t==='ideas');
}

/* ── Pill ── */
function setPill(el){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  activePill=el.dataset.s;
  renderCampaigns();
}

function onSearch(){
  searchQ=document.getElementById('hdr-search').value.toLowerCase();
  if(activeTab==='campaigns')renderCampaigns();else renderIdeas();
}

function openNew(){
  if(activeTab==='campaigns')openCDrawer(null);else openIDrawer(null);
}

/* ── Render campaigns ── */
function renderCampaigns(){
  // Update pill counts
  const counts={};
  STATUS_ORDER.forEach(s=>counts[s]=0);
  campaigns.forEach(r=>{const s=r.fields.Status||'';if(counts[s]!==undefined)counts[s]++;});
  document.getElementById('cnt-all').textContent=campaigns.length;
  document.getElementById('cnt-inp').textContent=counts['In Progress']||0;
  document.getElementById('cnt-ready').textContent=counts['Ready']||0;
  document.getElementById('cnt-plan').textContent=counts['Planning']||0;
  document.getElementById('cnt-idea').textContent=counts['Idea']||0;
  document.getElementById('cnt-sent').textContent=counts['Sent']||0;

  // Filter
  let data=campaigns.filter(r=>{
    const f=r.fields;
    if(activePill!=='all'&&f.Status!==activePill)return false;
    if(searchQ&&!(f['Subject / Topic']||'').toLowerCase().includes(searchQ))return false;
    return true;
  });

  const el=document.getElementById('campaigns-main');
  if(!data.length){el.innerHTML=`<div class="empty"><div class="ei">📭</div><p>No campaigns found.</p></div>`;return;}

  // Group by status
  const groups={};
  STATUS_ORDER.forEach(s=>{groups[s]=[];});
  data.forEach(r=>{
    const s=r.fields.Status||'Idea';
    if(!groups[s])groups[s]=[];
    groups[s].push(r);
  });

  let html='';
  STATUS_ORDER.forEach(s=>{
    const grp=groups[s];
    if(!grp||!grp.length)return;
    const col=SC[s]||'#9ca3af';
    html+=`<div class="group">
      <div class="group-hdr">
        <div class="group-dot" style="background:${col}"></div>
        <span class="group-label">${s}</span>
        <span class="group-count">${grp.length}</span>
        <div class="group-line"></div>
      </div>`;
    grp.forEach(rec=>{
      const f=rec.fields, id=rec.id;
      const accent=SC[f.Status]||'#e8ecf2';

      // Date
      let dateCls='f-date nodate', dateLabel='No date';
      if(f['Send Date']){
        const d=new Date(f['Send Date']+'T12:00:00');
        const today=new Date();today.setHours(0,0,0,0);
        const diff=Math.round((d-today)/86400000);
        dateLabel=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        dateCls='f-date'+(diff>=0&&diff<=3?' urgent':diff>3&&diff<=7?' soon':'');
      }

      // Type badge
      const tbg=TC[f.Type];
      const typeBadge=f.Type
        ?`<span class="type-badge" style="background:${tbg}">${f.Type}</span>`
        :`<span class="type-badge empty">Type</span>`;

      // Team dots
      const dots=TEAM.map(([init,field])=>{
        const val=f[field]||'';
        const bg=DC[val]||'#e8ecf2';
        return `<div class="tp"><span class="ti">${init}</span><div class="td" style="background:${bg}" title="${init}: ${val||'—'}" data-action="dot" data-id="${id}" data-field="${field}" data-val="${val}"></div></div>`;
      }).join('');

      const fileHtml=f['File #']
        ?`<span class="f-filenum has-val" data-action="edit-file" data-id="${id}" data-val="${f['File #']}">#${f['File #']}</span>`
        :`<span class="f-filenum" data-action="edit-file" data-id="${id}" data-val="">File #</span>`;

      html+=`<div class="crow">
        <div class="crow-accent" style="background:${accent}"></div>
        <div class="crow-body">
          <div class="crow-top">
            <div class="f-subject" contenteditable="true" spellcheck="false"
              data-action="edit-subject" data-id="${id}"
              data-orig="${esc(f['Subject / Topic']||'')}">${esc(f['Subject / Topic']||'Untitled campaign')}</div>
            <div class="badge-wrap">
              ${typeBadge}
              <select class="badge-over" data-action="edit-type" data-id="${id}">
                ${['','New Product','General','YouTube','Limited Run'].map(o=>`<option value="${o}"${f.Type===o?' selected':''}>${o||'— Type —'}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="crow-bottom">
            <div class="team-strip">${dots}</div>
            <button class="btn-more" data-action="open-more" data-id="${id}">⋯ more</button>
          </div>
        </div>
        <div class="crow-right">
          <div class="${dateCls}" data-action="edit-date" data-id="${id}" data-val="${f['Send Date']||''}">${dateLabel}</div>
          ${fileHtml}
        </div>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

/* ── Render ideas ── */
function renderIdeas(){
  document.getElementById('cnt-ideas').textContent=ideas.length;
  const data=ideas.filter(r=>{
    if(searchQ&&!(r.fields.Idea||'').toLowerCase().includes(searchQ))return false;
    return true;
  });
  const el=document.getElementById('ideas-grid');
  if(!data.length){el.innerHTML=`<div class="empty"><div class="ei">💭</div><p>No ideas yet.</p></div>`;return;}
  el.innerHTML=data.map(rec=>{
    const f=rec.fields,id=rec.id;
    const catCol=CC[f.Category]||'#e8ecf2';
    const isBadge=(val,map)=>val&&map[val]?`<span class="sm-badge" style="background:${map[val]}">${val}</span>`:`<span class="sm-badge empty">${val||'—'}</span>`;
    return `<div class="icard" onclick="openIDrawer('${id}')">
      <div class="icard-top" style="background:${catCol}"></div>
      <div class="icard-body">
        <div class="f-idea" contenteditable="true" spellcheck="false"
          data-action="edit-idea" data-id="${id}"
          data-orig="${esc(f.Idea||'')}"
          onclick="event.stopPropagation()">${esc(f.Idea||'')}</div>
        <div class="icard-foot">
          ${f['Submitted By']?`<span class="i-sub">${f['Submitted By']}</span>`:'<span></span>'}
          <div style="display:flex;gap:5px;align-items:center">
            ${isBadge(f.Category,CC)}
            ${isBadge(f.Status,IC)}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Event delegation ── */
document.addEventListener('change',async e=>{
  const a=e.target.dataset.action,id=e.target.dataset.id,val=e.target.value;
  if(a==='edit-type')   await qs(CT,id,{Type:val},campaigns);
  if(a==='edit-status') await qs(CT,id,{Status:val},campaigns);
});

document.addEventListener('click',async e=>{
  const el=e.target.closest('[data-action]');
  if(!el)return;
  const a=el.dataset.action,id=el.dataset.id;

  if(a==='dot'){
    const cur=el.dataset.val;
    const next=DCYCLE[(DCYCLE.indexOf(cur)+1)%DCYCLE.length];
    el.style.background=DC[next]||'#e8ecf2';el.dataset.val=next;
    el.title=el.closest('.tp').querySelector('.ti').textContent+': '+(next||'—');
    const flds={};flds[el.dataset.field]=next||null;
    await qs(CT,id,flds,campaigns,false);
    return;
  }
  if(a==='edit-date'){
    if(el.querySelector('input'))return;
    const cur=el.dataset.val||'';
    const inp=document.createElement('input');
    inp.type='date';inp.className='f-date-inp';inp.value=cur;
    el.innerHTML='';el.appendChild(inp);inp.focus();
    const save=async()=>{await qs(CT,id,{'Send Date':inp.value||null},campaigns);};
    inp.addEventListener('blur',save);
    inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();});
    return;
  }
  if(a==='edit-file'){
    if(el.querySelector('input'))return;
    const inp=document.createElement('input');
    inp.type='number';inp.className='f-file-inp';inp.value=el.dataset.val||'';inp.placeholder='File #';
    el.replaceWith(inp);inp.focus();inp.select();
    inp.addEventListener('blur',async()=>{const v=inp.value.trim();await qs(CT,id,{'File #':v?parseInt(v):null},campaigns,true);});
    inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();});
    return;
  }
  if(a==='open-more'){openCDrawer(id,true);return;}
});

document.addEventListener('focusout',async e=>{
  const a=e.target.dataset.action,id=e.target.dataset.id;
  if(!a||!id)return;
  const val=e.target.textContent.trim(),orig=e.target.dataset.orig||'';
  if(a==='edit-subject'&&val!==orig){e.target.dataset.orig=val;await qs(CT,id,{'Subject / Topic':val},campaigns,true);}
  if(a==='edit-idea'&&val!==orig){e.target.dataset.orig=val;await qs(IT,id,{Idea:val},ideas,true);}
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeDrawer();
  if(e.key==='Enter'&&(e.target.dataset.action==='edit-subject'))e.preventDefault(),e.target.blur();
});

/* ── Quick save ── */
async function qs(tbl,id,fields,arr,rerender=true){
  try{
    await atPatch(tbl,id,fields);
    const i=arr.findIndex(r=>r.id===id);
    if(i!==-1)Object.assign(arr[i].fields,fields);
    if(rerender){arr===campaigns?renderCampaigns():renderIdeas();}
    toast('Saved ✓');
  }catch(err){toast('Error: '+err.message);}
}

/* ── Campaign drawer ── */
function openCDrawer(id,more){
  editCId=id;
  document.getElementById('cd-title').textContent=id?(more?'Campaign Details':'Edit Campaign'):'Add Campaign';
  document.getElementById('cd-del').style.display=id?'inline-block':'none';
  const f=id?(campaigns.find(r=>r.id===id)||{}).fields||{}:{};
  document.getElementById('cd-subject').value=f['Subject / Topic']||'';
  document.getElementById('cd-type').value=f.Type||'';
  document.getElementById('cd-status').value=f.Status||'';
  document.getElementById('cd-date').value=f['Send Date']||'';
  document.getElementById('cd-file').value=f['File #']||'';
  document.getElementById('cd-revenue').value=f.Revenue||'';
  document.getElementById('cd-social').checked=!!f['Social Posts'];
  document.getElementById('cd-waitlist').checked=!!f['Waitlist / Dealer / Agency'];
  document.getElementById('cd-stephen').value=f['Stephen - Content']||'';
  document.getElementById('cd-kp').value=f['Kurt - Photos']||'';
  document.getElementById('cd-ky').value=f['Kurt - YouTube']||'';
  document.getElementById('cd-kelly').value=f['Kelly - Listing']||'';
  document.getElementById('cd-patty').value=f['Patty - Email']||'';
  document.getElementById('cd-chris').value=f['Chris - SKU/BOM/BOL']||'';
  document.getElementById('cd-notes').value=f.Notes||'';
  openDr('cdrawer');
}
async function saveCampaign(){
  const sub=document.getElementById('cd-subject').value.trim();
  if(!sub){toast('Subject is required');return;}
  const flds={'Subject / Topic':sub};
  const v=(eid,k)=>{const val=document.getElementById(eid).value;if(val)flds[k]=val;};
  v('cd-type','Type');v('cd-date','Send Date');v('cd-status','Status');
  const fn=document.getElementById('cd-file').value;if(fn)flds['File #']=parseInt(fn);
  const rv=document.getElementById('cd-revenue').value;if(rv)flds.Revenue=parseFloat(rv);
  flds['Social Posts']=document.getElementById('cd-social').checked;
  flds['Waitlist / Dealer / Agency']=document.getElementById('cd-waitlist').checked;
  v('cd-stephen','Stephen - Content');v('cd-kp','Kurt - Photos');v('cd-ky','Kurt - YouTube');
  v('cd-kelly','Kelly - Listing');v('cd-patty','Patty - Email');v('cd-chris','Chris - SKU/BOM/BOL');
  const n=document.getElementById('cd-notes').value.trim();if(n)flds.Notes=n;
  try{
    if(editCId)await atPatch(CT,editCId,flds);else await atCreate(CT,flds);
    closeDrawer();
    campaigns=await atFetch(CT,'sort[0][field]=Send+Date&sort[0][direction]=asc');
    renderCampaigns();toast('Saved ✓');
  }catch(err){toast('Error: '+err.message);}
}
async function delCampaign(){
  if(!editCId||!confirm('Delete this campaign?'))return;
  try{await atDel(CT,editCId);closeDrawer();campaigns=await atFetch(CT,'sort[0][field]=Send+Date&sort[0][direction]=asc');renderCampaigns();toast('Deleted');}
  catch(err){toast('Error: '+err.message);}
}

/* ── Idea drawer ── */
function openIDrawer(id){
  editIId=id;
  document.getElementById('id-title').textContent=id?'Edit Idea':'Add Idea';
  document.getElementById('id-del').style.display=id?'inline-block':'none';
  const f=id?(ideas.find(r=>r.id===id)||{}).fields||{}:{};
  document.getElementById('id-idea').value=f.Idea||'';
  document.getElementById('id-cat').value=f.Category||'';
  document.getElementById('id-status').value=f.Status||'';
  document.getElementById('id-by').value=f['Submitted By']||'';
  document.getElementById('id-campaign').value=f.Campaign||'';
  document.getElementById('id-notes').value=f.Notes||'';
  openDr('idrawer');
}
async function saveIdea(){
  const idea=document.getElementById('id-idea').value.trim();
  if(!idea){toast('Idea text required');return;}
  const flds={Idea:idea};
  const v=(eid,k)=>{const val=document.getElementById(eid).value;if(val)flds[k]=val;};
  v('id-cat','Category');v('id-status','Status');v('id-by','Submitted By');v('id-campaign','Campaign');
  const n=document.getElementById('id-notes').value.trim();if(n)flds.Notes=n;
  try{
    if(editIId)await atPatch(IT,editIId,flds);else await atCreate(IT,flds);
    closeDrawer();ideas=await atFetch(IT,'');renderIdeas();toast('Saved ✓');
  }catch(err){toast('Error: '+err.message);}
}
async function delIdea(){
  if(!editIId||!confirm('Delete this idea?'))return;
  try{await atDel(IT,editIId);closeDrawer();ideas=await atFetch(IT,'');renderIdeas();toast('Deleted');}
  catch(err){toast('Error: '+err.message);}
}

/* ── Drawer utils ── */
function openDr(id){closeDrawer();activeDrawer=id;document.getElementById('bdrop').classList.add('open');document.getElementById(id).classList.add('open');}
function closeDrawer(){if(activeDrawer)document.getElementById(activeDrawer).classList.remove('open');document.getElementById('bdrop').classList.remove('open');activeDrawer=null;}

/* ── Toast ── */
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);}

/* ── Escape ── */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Init ── */
(async()=>{
  document.getElementById('campaigns-main').innerHTML=`<div class="empty"><div class="ei">⏳</div><p>Loading…</p></div>`;
  [campaigns,ideas]=await Promise.all([
    atFetch(CT,'sort[0][field]=Send+Date&sort[0][direction]=asc'),
    atFetch(IT,'')
  ]);
  renderCampaigns();renderIdeas();
})();
</script>
