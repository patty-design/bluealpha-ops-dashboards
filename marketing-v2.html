<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📣 Marketing · Blue Alpha</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#111827;min-height:100vh;font-size:13px}

/* ── Top bar ── */
.topbar{background:#fff;border-bottom:1.5px solid #e5e7eb;padding:0 20px;display:flex;align-items:center;height:48px;gap:0;position:sticky;top:0;z-index:50}
.tb-logo{font-size:.82rem;font-weight:800;color:#1B2438;letter-spacing:-.2px;margin-right:24px;white-space:nowrap}
.tb-logo span{color:#BD3333}
.tb-tabs{display:flex;height:100%}
.tb-tab{padding:0 16px;border:none;background:none;font-size:.8rem;font-weight:600;color:#9ca3af;cursor:pointer;border-bottom:2px solid transparent;transition:color .12s}
.tb-tab.active{color:#1B2438;border-bottom-color:#BD3333}
.tb-tab:hover:not(.active){color:#6b7280}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-search{border:1.5px solid #e5e7eb;border-radius:6px;padding:5px 11px;font-size:.8rem;color:#374151;outline:none;width:180px;background:#f9fafb}
.tb-search:focus{border-color:#5B7FA0;background:#fff}
.btn-add{background:#BD3333;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-add:hover{background:#a02a2a}

/* ── Filters bar ── */
.filterbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fil-sel{border:1.5px solid #e5e7eb;border-radius:6px;padding:4px 9px;font-size:.78rem;color:#374151;background:#fff;outline:none;cursor:pointer}
.fil-sel:focus{border-color:#5B7FA0}
.fil-sep{width:1px;height:20px;background:#e5e7eb;margin:0 2px}
.row-count{margin-left:auto;font-size:.75rem;color:#9ca3af;font-weight:500}

/* ── Table wrapper ── */
.tbl-wrap{overflow-x:auto;padding:16px 20px}

/* ── Grid table ── */
.grid{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1.5px solid #e5e7eb}

/* Header */
.grid thead tr{background:#f8fafc}
.grid th{
  padding:8px 12px;
  text-align:left;
  font-size:.68rem;font-weight:800;color:#9ca3af;
  text-transform:uppercase;letter-spacing:.08em;
  border-bottom:2px solid #e5e7eb;
  border-right:1px solid #e5e7eb;
  white-space:nowrap;
  position:sticky;top:48px;background:#f8fafc;z-index:10;
}
.grid th:last-child{border-right:none}
.grid th.th-center{text-align:center}

/* Rows */
.grid tbody tr{border-bottom:1px solid #f1f3f6;transition:background .1s}
.grid tbody tr:hover{background:#f5f8ff}
.grid tbody tr:last-child{border-bottom:none}

/* Cells */
.grid td{
  padding:0;
  border-right:1px solid #f1f3f6;
  vertical-align:middle;
}
.grid td:last-child{border-right:none}

/* Editable cell wrapper */
.cell{
  padding:9px 12px;
  display:flex;align-items:center;
  min-height:38px;
}
.cell-center{justify-content:center}

/* Subject */
.f-sub{
  font-size:.84rem;font-weight:500;color:#111827;
  cursor:text;outline:none;line-height:1.4;
  border-radius:3px;padding:1px 3px;margin:-1px -3px;
  min-width:60px;
}
.f-sub:hover,.f-sub:focus{background:#eef3fc;outline:none}
.f-sub:focus{box-shadow:inset 0 0 0 2px #5B7FA0}

/* Status chip */
.chip{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:20px;
  font-size:.72rem;font-weight:700;
  white-space:nowrap;cursor:pointer;
  transition:filter .1s;
}
.chip:hover{filter:brightness(.93)}
.chip.empty{background:#f1f5f9;color:#94a3b8;border:1.5px dashed #d1d5db}

/* Status cell backgrounds */
td.status-cell{background:transparent}
.status-Idea      .chip{background:#f1f5f9;color:#64748b}
.status-Planning  .chip{background:#fef9c3;color:#92400e}
.status-InProgress .chip{background:#dbeafe;color:#1e40af}
.status-Ready     .chip{background:#ede9fe;color:#5b21b6}
.status-Sent      .chip{background:#dcfce7;color:#166534}

/* Type chip */
.type-NP  .chip{background:#dbeafe;color:#1e40af}
.type-Gen .chip{background:#f1f5f9;color:#374151}
.type-YT  .chip{background:#fee2e2;color:#991b1b}
.type-LR  .chip{background:#d1fae5;color:#065f46}

/* Inline select overlay */
.chip-wrap{position:relative;display:inline-flex}
.chip-sel{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;font-size:0}

/* Date cell */
.f-date{
  font-size:.8rem;font-weight:500;color:#374151;
  cursor:pointer;white-space:nowrap;
  border-radius:3px;padding:1px 4px;margin:-1px -4px;
}
.f-date:hover{background:#f0f4f8}
.f-date.urgent{color:#BD3333;font-weight:700}
.f-date.soon{color:#d97706;font-weight:600}
.f-date.nodate{color:#d1d5db;font-style:italic;font-size:.75rem}
input.date-inp{border:1.5px solid #5B7FA0;border-radius:5px;padding:3px 6px;font-size:.78rem;outline:none;background:#fff;font-family:inherit}

/* Team dot cell */
.tdot{
  width:16px;height:16px;border-radius:50%;
  border:1.5px solid rgba(0,0,0,.1);cursor:pointer;
  transition:transform .1s,box-shadow .1s;
  flex-shrink:0;
}
.tdot:hover{transform:scale(1.35);box-shadow:0 2px 6px rgba(0,0,0,.18)}

/* File # */
.f-file{
  font-size:.78rem;color:#9ca3af;cursor:text;
  border-radius:3px;padding:1px 4px;margin:-1px -4px;
  min-width:36px;text-align:right;
}
.f-file:hover{background:#f0f4f8}
.f-file.has-v{color:#374151;font-weight:500}
input.file-inp{width:60px;border:1.5px solid #5B7FA0;border-radius:4px;padding:2px 5px;font-size:.78rem;outline:none;font-family:inherit;text-align:right;background:#fff}

/* More button */
.btn-more{border:none;background:none;font-size:.85rem;color:#c4c9d4;cursor:pointer;padding:3px 7px;border-radius:4px;transition:all .1s}
.btn-more:hover{background:#f0f4f8;color:#6b7280}

/* ── Ideas table ── */
.ideas-tbl-wrap{overflow-x:auto;padding:16px 20px}

/* ── Drawer ── */
.bdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:100;backdrop-filter:blur(1px)}
.bdrop.open{display:block}
.drawer{position:fixed;top:0;right:-480px;width:460px;max-width:96vw;height:100vh;background:#fff;z-index:101;overflow-y:auto;transition:right .2s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
.drawer.open{right:0}
.d-hdr{padding:16px 20px;border-bottom:1.5px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;background:#f8fafc;position:sticky;top:0;z-index:5}
.d-hdr span{font-size:.95rem;font-weight:700;color:#1a1a2e}
.d-x{width:28px;height:28px;border:none;background:#e8ecf2;border-radius:50%;cursor:pointer;font-size:.9rem;color:#6b7280;display:flex;align-items:center;justify-content:center}
.d-x:hover{background:#d1d5db}
.d-body{padding:18px 20px;flex:1;display:flex;flex-direction:column;gap:13px}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:.68rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em}
.fld input,.fld select,.fld textarea{padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:.85rem;color:#374151;background:#fff;outline:none;font-family:inherit}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:#5B7FA0}
.fld textarea{resize:vertical;min-height:64px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sec-lbl{font-size:.67rem;font-weight:800;color:#b0bbc8;text-transform:uppercase;letter-spacing:.1em;padding-bottom:5px;border-bottom:1px solid #e5e7eb}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chk{display:flex;align-items:center;gap:6px;font-size:.84rem;color:#374151;cursor:pointer;padding:3px 0}
.chk input{width:14px;height:14px;accent-color:#BD3333;cursor:pointer}
.d-ftr{padding:13px 20px;border-top:1.5px solid #e5e7eb;display:flex;gap:8px;align-items:center;background:#f8fafc;position:sticky;bottom:0}
.d-save{flex:1;padding:8px;background:#BD3333;color:#fff;border:none;border-radius:7px;font-size:.85rem;font-weight:700;cursor:pointer}
.d-save:hover{background:#a02a2a}
.d-cancel{padding:8px 14px;background:#f1f5f9;color:#374151;border:none;border-radius:7px;font-size:.85rem;font-weight:600;cursor:pointer}
.d-cancel:hover{background:#e2e8f0}
.d-del{padding:8px 12px;background:none;color:#ef4444;border:1.5px solid #fecaca;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer}
.d-del:hover{background:#fee2e2}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#1B2438;color:#fff;padding:8px 18px;border-radius:7px;font-size:.82rem;font-weight:500;z-index:300;transition:transform .22s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── Empty ── */
.empty-row td{text-align:center;padding:40px;color:#9ca3af;font-style:italic}

/* Legend row */
.legend{display:flex;gap:14px;align-items:center;padding:6px 20px 12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:#6b7280}
.leg-dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">BLUE <span>ALPHA</span></div>
  <div class="tb-tabs">
    <button class="tb-tab active" id="htab-c" onclick="showTab('campaigns')">📧 Campaigns</button>
    <button class="tb-tab" id="htab-i" onclick="showTab('ideas')">💡 Ideas</button>
  </div>
  <div class="tb-right">
    <input type="text" class="tb-search" id="tb-search" placeholder="Search…" oninput="onSearch()">

</div>

<!-- CAMPAIGNS -->
<div id="tab-campaigns">
  <div class="filterbar">
    <select class="fil-sel" id="fil-status" onchange="renderC()">
      <option value="">All Statuses</option>

      <option>In Progress</option><option>Ready</option><option>Sent</option>

      <option value="">All Types</option>

  <div class="tbl-wrap">
    <table class="grid" id="c-grid">
      <thead>
        <tr>
          <th style="min-width:280px">Subject / Topic</th>
          <th style="min-width:105px">Send Date</th>
          <th style="min-width:110px">Type</th>
          <th style="min-width:115px">Status</th>
          <th class="th-center" style="width:42px" title="Stephen – Content">S</th>
          <th class="th-center" style="width:42px" title="Kurt – Photos">K📷</th>
          <th class="th-center" style="width:42px" title="Kurt – YouTube">K▶</th>
          <th class="th-center" style="width:42px" title="Kelly – Listing">Ke</th>

  <div class="legend">

</div>

<!-- IDEAS -->

          <th style="min-width:130px">Category</th>

      </thead>

        <tr><td colspan="6" style="text-align:center;padding:40px;color:#9ca3af">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Backdrop + Drawers -->
<div class="bdrop" id="bdrop" onclick="closeDrawer()"></div>

<div class="drawer" id="cdrawer">
  <div class="d-hdr"><span id="cd-title">Campaign</span><button class="d-x" onclick="closeDrawer()">✕</button></div>
  <div class="d-body">
    <div class="fld"><label>Subject / Topic *</label><input type="text" id="cd-sub"></div>
    <div class="frow">
      <div class="fld"><label>Type</label><select id="cd-type"><option value="">—</option><option>New Product</option><option>General</option><option>YouTube</option><option>Limited Run</option></select></div>

      <div class="fld"><label>Stephen – Content</label><select id="cd-stephen"><option value="">—</option><option>Not Started</option><option>In Progress</option><option>Done</option><option>N/A</option></select></div>

      <div class="fld"><label>Kurt – YouTube</label><select id="cd-ky"><option value="">—</option><option>Not Started</option><option>In Progress</option><option>Done</option><option>N/A</option></select></div>
      <div class="fld"><label>Kelly – Listing</label><select id="cd-kelly"><option value="">—</option><option>Not Started</option><option>In Progress</option><option>Done</option><option>N/A</option></select></div>

      <div class="fld"><label>Chris – SKU/BOM/BOL</label><select id="cd-chris"><option value="">—</option><option>Not Started</option><option>In Progress</option><option>Done</option><option>N/A</option></select></div>

    <div class="fld"><label>Idea *</label><textarea id="id-idea" style="min-height:80px"></textarea></div>
    <div class="frow">
      <div class="fld"><label>Category</label><select id="id-cat"><option value="">—</option><option>New BA Product</option><option>Limited Run</option><option>Custom Shop</option><option>YouTube</option><option>New Other Product</option><option>General</option></select></div>
      <div class="fld"><label>Status</label><select id="id-stat"><option value="">—</option><option>New</option><option>Considering</option><option>Approved</option><option>Scheduled</option><option>Declined</option></select></div>

<script>
const TOK='__PATTY_TOKEN__', BASE='appTCZwoETAInVuiX', CT='tblxj6Nouo4DfzVwA', IT='tbldunjKUpRLtZAqW';
let C=[], I=[], editCId=null, editIId=null, activeDrawer=null, activeTab='campaigns', sq='';

/* Airtable */
async function atF(t,p){let r=[],o=null;do{const d=await(await fetch(`https://api.airtable.com/v0/${BASE}/${t}?${o?p+'&offset='+o:p}`,{headers:{Authorization:'Bearer '+TOK}})).json();r=r.concat(d.records||[]);o=d.offset;}while(o);return r;}
async function atP(t,id,f){const r=await fetch(`https://api.airtable.com/v0/${BASE}/${t}/${id}`,{method:'PATCH',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},body:JSON.stringify({fields:f})});if(!r.ok)throw new Error(await r.text());return r.json();}
async function atC(t,f){const r=await fetch(`https://api.airtable.com/v0/${BASE}/${t}`,{method:'POST',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},body:JSON.stringify({fields:f})});if(!r.ok)throw new Error(await r.text());return r.json();}
async function atD(t,id){await fetch(`https://api.airtable.com/v0/${BASE}/${t}/${id}`,{method:'DELETE',headers:{Authorization:'Bearer '+TOK}});}

/* Colors */
const SC={Idea:'#64748b',Planning:'#92400e','In Progress':'#1e40af',Ready:'#5b21b6',Sent:'#166534'};
const SBG={Idea:'#f1f5f9',Planning:'#fef9c3','In Progress':'#dbeafe',Ready:'#ede9fe',Sent:'#dcfce7'};
const TC2={'New Product':'#1e40af',General:'#374151',YouTube:'#991b1b','Limited Run':'#065f46'};
const TBG={'New Product':'#dbeafe',General:'#f1f5f9',YouTube:'#fee2e2','Limited Run':'#d1fae5'};
const IC={New:'#374151',Considering:'#92400e',Approved:'#1e40af',Scheduled:'#5b21b6',Declined:'#991b1b'};
const IBG={New:'#f1f5f9',Considering:'#fef9c3',Approved:'#dbeafe',Scheduled:'#ede9fe',Declined:'#fee2e2'};
const CC2={'New BA Product':'#1e40af','Limited Run':'#065f46','Custom Shop':'#92400e',YouTube:'#991b1b','New Other Product':'#3730a3',General:'#374151'};
const CBG={'New BA Product':'#dbeafe','Limited Run':'#d1fae5','Custom Shop':'#fef9c3',YouTube:'#fee2e2','New Other Product':'#e0e7ff',General:'#f1f5f9'};
const DC={Done:'#22c55e','In Progress':'#f59e0b','Not Started':'#d1d5db','N/A':'#c4b5fd'};
const DCYC=['Not Started','In Progress','Done','N/A',''];
const TEAM=[['S','Stephen - Content'],['K📷','Kurt - Photos'],['K▶','Kurt - YouTube'],['Ke','Kelly - Listing'],['P','Patty - Email'],['C','Chris - SKU/BOM/BOL']];

function chip(val,fg,bg,opts){
  if(!val||!fg)return `<span class="chip empty">${opts||'—'}</span>`;
  return `<span class="chip" style="background:${bg};color:${fg}">${val}</span>`;
}

/* Tab */
function showTab(t){activeTab=t;['campaigns','ideas'].forEach(s=>{document.getElementById('tab-'+s).style.display=s===t?'':'none';document.getElementById('htab-'+s[0]).classList.toggle('active',s===t);});document.getElementById('btn-new').textContent=t==='campaigns'?'+ New Campaign':'+ New Idea';}

function openNew(){activeTab==='campaigns'?openCDrawer(null):openIDrawer(null);}
function onSearch(){sq=document.getElementById('tb-search').value.toLowerCase();activeTab==='campaigns'?renderC():renderI();}

/* Render campaigns */
function renderC(){
  const sf=document.getElementById('fil-status').value;
  const tf=document.getElementById('fil-type').value;
  const data=C.filter(r=>{
    const f=r.fields;
    if(sf&&f.Status!==sf)return false;
    if(tf&&f.Type!==tf)return false;
    if(sq&&!(f['Subject / Topic']||'').toLowerCase().includes(sq))return false;
    return true;
  });
  document.getElementById('c-count').textContent=data.length+' campaign'+(data.length!==1?'s':'');
  const tb=document.getElementById('c-tbody');
  if(!data.length){tb.innerHTML=`<tr class="empty-row"><td colspan="12">No campaigns match your filters.</td></tr>`;return;}

  tb.innerHTML=data.map(rec=>{
    const f=rec.fields,id=rec.id;

    // Date
    let dateCls='f-date',dateLabel='—';
    if(f['Send Date']){
      const d=new Date(f['Send Date']+'T12:00:00'),today=new Date();today.setHours(0,0,0,0);
      const diff=Math.round((d-today)/86400000);
      dateLabel=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      dateCls='f-date'+(diff>=0&&diff<=3?' urgent':diff>3&&diff<=7?' soon':'');
    } else {dateCls='f-date nodate';dateLabel='No date';}

    const dots=TEAM.map(([,field])=>`<td><div class="cell cell-center"><div class="tdot" style="background:${DC[f[field]]||'#e8ecf2'}" title="${field.split(' - ')[0]}: ${f[field]||'—'}" data-action="dot" data-id="${id}" data-field="${field}" data-val="${f[field]||''}"></div></div></td>`).join('');

    return `<tr>
      <td><div class="cell"><div class="f-sub" contenteditable="true" spellcheck="false" data-action="sub" data-id="${id}" data-orig="${esc(f['Subject / Topic']||'')}">${esc(f['Subject / Topic']||'')}</div></div></td>
      <td><div class="cell"><span class="${dateCls}" data-action="date" data-id="${id}" data-val="${f['Send Date']||''}">${dateLabel}</span></div></td>
      <td><div class="cell"><div class="chip-wrap">${chip(f.Type,TC2[f.Type],TBG[f.Type],'Type')}<select class="chip-sel" data-action="type" data-id="${id}">${['','New Product','General','YouTube','Limited Run'].map(o=>`<option value="${o}"${f.Type===o?' selected':''}>${o||'— Type —'}</option>`).join('')}</select></div></div></td>
      <td><div class="cell"><div class="chip-wrap">${chip(f.Status,SC[f.Status],SBG[f.Status],'Status')}<select class="chip-sel" data-action="stat" data-id="${id}">${['','Idea','Planning','In Progress','Ready','Sent'].map(o=>`<option value="${o}"${f.Status===o?' selected':''}>${o||'— Status —'}</option>`).join('')}</select></div></div></td>
      ${dots}
      <td><div class="cell" style="justify-content:flex-end"><span class="f-file${f['File #']?' has-v':''}" data-action="file" data-id="${id}" data-val="${f['File #']||''}">${f['File #']?'#'+f['File #']:'—'}</span></div></td>
      <td><div class="cell cell-center"><button class="btn-more" data-action="more" data-id="${id}">⋯</button></div></td>
    </tr>`;
  }).join('');
}

/* Render ideas */
function renderI(){
  const sf=document.getElementById('fil-istat').value;
  const cf=document.getElementById('fil-icat').value;
  const bf=document.getElementById('fil-iby').value;
  const data=I.filter(r=>{
    const f=r.fields;
    if(sf&&f.Status!==sf)return false;
    if(cf&&f.Category!==cf)return false;
    if(bf&&f['Submitted By']!==bf)return false;
    if(sq&&!(f.Idea||'').toLowerCase().includes(sq))return false;
    return true;
  });
  document.getElementById('i-count').textContent=data.length+' idea'+(data.length!==1?'s':'');
  const tb=document.getElementById('i-tbody');
  if(!data.length){tb.innerHTML=`<tr class="empty-row"><td colspan="6">No ideas found.</td></tr>`;return;}
  tb.innerHTML=data.map(rec=>{
    const f=rec.fields,id=rec.id;
    return `<tr>
      <td><div class="cell"><div class="f-sub" contenteditable="true" spellcheck="false" data-action="idea" data-id="${id}" data-orig="${esc(f.Idea||'')}">${esc(f.Idea||'')}</div></div></td>
      <td><div class="cell"><div class="chip-wrap">${chip(f.Category,CC2[f.Category],CBG[f.Category],'Category')}<select class="chip-sel" data-action="icat" data-id="${id}">${['','New BA Product','Limited Run','Custom Shop','YouTube','New Other Product','General'].map(o=>`<option value="${o}"${f.Category===o?' selected':''}>${o||'— Category —'}</option>`).join('')}</select></div></div></td>
      <td><div class="cell"><div class="chip-wrap">${chip(f.Status,IC[f.Status],IBG[f.Status],'Status')}<select class="chip-sel" data-action="istat" data-id="${id}">${['','New','Considering','Approved','Scheduled','Declined'].map(o=>`<option value="${o}"${f.Status===o?' selected':''}>${o||'— Status —'}</option>`).join('')}</select></div></div></td>
      <td><div class="cell" style="color:#374151;font-size:.82rem">${esc(f['Submitted By']||'—')}</div></td>
      <td><div class="cell" style="color:#6b7280;font-size:.8rem">${esc(f.Campaign||'—')}</div></td>
      <td><div class="cell cell-center"><button class="btn-more" data-action="imore" data-id="${id}">⋯</button></div></td>
    </tr>`;
  }).join('');
}

/* Events */
document.addEventListener('change',async e=>{
  const a=e.target.dataset.action,id=e.target.dataset.id,v=e.target.value;
  if(a==='type') await qs(CT,id,{Type:v},C);
  if(a==='stat') await qs(CT,id,{Status:v},C);
  if(a==='icat') await qs(IT,id,{Category:v},I);
  if(a==='istat')await qs(IT,id,{Status:v},I);
});

document.addEventListener('click',async e=>{
  const el=e.target.closest('[data-action]');if(!el)return;
  const a=el.dataset.action,id=el.dataset.id;
  if(a==='dot'){
    const cur=el.dataset.val,next=DCYC[(DCYC.indexOf(cur)+1)%DCYC.length];
    el.style.background=DC[next]||'#e8ecf2';el.dataset.val=next;
    el.title=el.title.split(':')[0]+': '+(next||'—');
    const flds={};flds[el.dataset.field]=next||null;
    await qs(CT,id,flds,C,false);return;
  }
  if(a==='date'){
    if(el.querySelector('input'))return;
    const inp=document.createElement('input');inp.type='date';inp.className='date-inp';inp.value=el.dataset.val||'';
    el.innerHTML='';el.appendChild(inp);inp.focus();
    inp.addEventListener('blur',async()=>{await qs(CT,id,{'Send Date':inp.value||null},C);});
    inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();});return;
  }
  if(a==='file'){
    if(el.querySelector('input'))return;
    const inp=document.createElement('input');inp.type='number';inp.className='file-inp';inp.value=el.dataset.val||'';inp.placeholder='—';
    el.replaceWith(inp);inp.focus();inp.select();
    inp.addEventListener('blur',async()=>{const v=inp.value.trim();await qs(CT,id,{'File #':v?parseInt(v):null},C,true);});
    inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();});return;
  }
  if(a==='more') {openCDrawer(id,true);return;}
  if(a==='imore'){openIDrawer(id);return;}
});

document.addEventListener('focusout',async e=>{
  const a=e.target.dataset.action,id=e.target.dataset.id;if(!a||!id)return;
  const v=e.target.textContent.trim(),orig=e.target.dataset.orig||'';
  if(a==='sub'&&v!==orig){e.target.dataset.orig=v;await qs(CT,id,{'Subject / Topic':v},C,true);}
  if(a==='idea'&&v!==orig){e.target.dataset.orig=v;await qs(IT,id,{Idea:v},I,true);}
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeDrawer();
  if(e.key==='Enter'&&(e.target.dataset.action==='sub'||e.target.dataset.action==='idea')){e.preventDefault();e.target.blur();}
});

/* Quick save */
async function qs(tbl,id,fields,arr,re=true){
  try{
    await atP(tbl,id,fields);
    const i=arr.findIndex(r=>r.id===id);if(i!==-1)Object.assign(arr[i].fields,fields);
    if(re){arr===C?renderC():renderI();}
    toast('Saved ✓');
  }catch(err){toast('Error: '+err.message);}
}

/* Campaign drawer */
function openCDrawer(id,more){
  editCId=id;
  document.getElementById('cd-title').textContent=id?(more?'Campaign Details':'Edit Campaign'):'New Campaign';
  document.getElementById('cd-del').style.display=id?'inline-block':'none';
  const f=id?(C.find(r=>r.id===id)||{}).fields||{}:{};
  document.getElementById('cd-sub').value=f['Subject / Topic']||'';
  document.getElementById('cd-type').value=f.Type||'';
  document.getElementById('cd-stat').value=f.Status||'';
  document.getElementById('cd-date').value=f['Send Date']||'';
  document.getElementById('cd-file').value=f['File #']||'';
  document.getElementById('cd-rev').value=f.Revenue||'';
  document.getElementById('cd-social').checked=!!f['Social Posts'];
  document.getElementById('cd-wait').checked=!!f['Waitlist / Dealer / Agency'];
  document.getElementById('cd-stephen').value=f['Stephen - Content']||'';
  document.getElementById('cd-kp').value=f['Kurt - Photos']||'';
  document.getElementById('cd-ky').value=f['Kurt - YouTube']||'';
  document.getElementById('cd-kelly').value=f['Kelly - Listing']||'';
  document.getElementById('cd-patty').value=f['Patty - Email']||'';
  document.getElementById('cd-chris').value=f['Chris - SKU/BOM/BOL']||'';
  document.getElementById('cd-notes').value=f.Notes||'';
  openDr('cdrawer');
}
async function saveC(){
  const sub=document.getElementById('cd-sub').value.trim();if(!sub){toast('Subject required');return;}
  const flds={'Subject / Topic':sub};
  const v=(eid,k)=>{const val=document.getElementById(eid).value;if(val)flds[k]=val;};
  v('cd-type','Type');v('cd-stat','Status');v('cd-date','Send Date');
  const fn=document.getElementById('cd-file').value;if(fn)flds['File #']=parseInt(fn);
  const rv=document.getElementById('cd-rev').value;if(rv)flds.Revenue=parseFloat(rv);
  flds['Social Posts']=document.getElementById('cd-social').checked;
  flds['Waitlist / Dealer / Agency']=document.getElementById('cd-wait').checked;
  v('cd-stephen','Stephen - Content');v('cd-kp','Kurt - Photos');v('cd-ky','Kurt - YouTube');
  v('cd-kelly','Kelly - Listing');v('cd-patty','Patty - Email');v('cd-chris','Chris - SKU/BOM/BOL');
  const n=document.getElementById('cd-notes').value.trim();if(n)flds.Notes=n;
  try{
    if(editCId)await atP(CT,editCId,flds);else await atC(CT,flds);
    closeDrawer();C=await atF(CT,'sort[0][field]=Send+Date&sort[0][direction]=asc');renderC();toast('Saved ✓');
  }catch(err){toast('Error: '+err.message);}
}
async function delC(){if(!editCId||!confirm('Delete?'))return;try{await atD(CT,editCId);closeDrawer();C=await atF(CT,'sort[0][field]=Send+Date&sort[0][direction]=asc');renderC();toast('Deleted');}catch(err){toast('Error: '+err.message);}}

/* Idea drawer */
function openIDrawer(id){
  editIId=id;
  document.getElementById('id-title').textContent=id?'Edit Idea':'New Idea';
  document.getElementById('id-del').style.display=id?'inline-block':'none';
  const f=id?(I.find(r=>r.id===id)||{}).fields||{}:{};
  document.getElementById('id-idea').value=f.Idea||'';
  document.getElementById('id-cat').value=f.Category||'';
  document.getElementById('id-stat').value=f.Status||'';
  document.getElementById('id-by').value=f['Submitted By']||'';
  document.getElementById('id-camp').value=f.Campaign||'';
  document.getElementById('id-notes').value=f.Notes||'';
  openDr('idrawer');
}
async function saveI(){
  const idea=document.getElementById('id-idea').value.trim();if(!idea){toast('Idea required');return;}
  const flds={Idea:idea};
  const v=(eid,k)=>{const val=document.getElementById(eid).value;if(val)flds[k]=val;};
  v('id-cat','Category');v('id-stat','Status');v('id-by','Submitted By');v('id-camp','Campaign');
  const n=document.getElementById('id-notes').value.trim();if(n)flds.Notes=n;
  try{
    if(editIId)await atP(IT,editIId,flds);else await atC(IT,flds);
    closeDrawer();I=await atF(IT,'');renderI();toast('Saved ✓');
  }catch(err){toast('Error: '+err.message);}
}
async function delI(){if(!editIId||!confirm('Delete?'))return;try{await atD(IT,editIId);closeDrawer();I=await atF(IT,'');renderI();toast('Deleted');}catch(err){toast('Error: '+err.message);}}

/* Drawer utils */
function openDr(id){closeDrawer();activeDrawer=id;document.getElementById('bdrop').classList.add('open');document.getElementById(id).classList.add('open');}
function closeDrawer(){if(activeDrawer)document.getElementById(activeDrawer).classList.remove('open');document.getElementById('bdrop').classList.remove('open');activeDrawer=null;}

/* Toast */
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);}

/* Escape */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* Init */
(async()=>{[C,I]=await Promise.all([atF(CT,'sort[0][field]=Send+Date&sort[0][direction]=asc'),atF(IT,'')]);renderC();renderI();})();
</script>
